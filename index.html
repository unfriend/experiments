<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 95 Directory</title>
    <style>
        /* --- Basic Reset & Win95 Styling --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "MS Sans Serif", "Microsoft Sans Serif", Arial, sans-serif;
            user-select: none; /* Prevents text highlighting while dragging */
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #008080; /* Classic Win95 Teal */
        }

        /* --- Desktop Area --- */
        #desktop {
            position: relative;
            width: 100%;
            height: calc(100% - 30px); /* Leave room for taskbar */
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 15px;
        }

        /* --- Desktop Icons --- */
        .desktop-icon {
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-align: center;
        }

        .icon-img {
            width: 32px;
            height: 32px;
            background-color: #fff;
            border: 1px solid #000;
            position: relative;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            margin-bottom: 4px;
        }

        /* Little dog-ear fold for the document icon */
        .icon-img::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            border-width: 0 10px 10px 0;
            border-style: solid;
            border-color: #008080 #008080 #ccc #ccc;
        }

        .icon-text {
            color: white;
            font-size: 11px;
            padding: 2px;
            word-wrap: break-word;
            max-width: 100%;
        }

        .desktop-icon:active .icon-text {
            background-color: #000080;
            outline: 1px dotted #fff;
        }

        /* --- Taskbar --- */
        #taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background-color: #c0c0c0;
            border-top: 1px solid #fff;
            display: flex;
            align-items: center;
            padding: 2px;
            box-shadow: inset 0 1px #dfdfdf;
            z-index: 9999;
        }

        #start-btn {
            font-weight: bold;
            display: flex;
            align-items: center;
            padding: 2px 5px;
            height: 100%;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            background: #c0c0c0;
            cursor: pointer;
            margin-right: 5px;
        }

        #start-btn:active {
            border-color: #808080 #fff #fff #808080;
            padding: 3px 4px 1px 6px; /* Shifts text to simulate press */
        }

        /* Windows Logo Fake */
        .win-logo {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: conic-gradient(red 90deg, green 90deg 180deg, blue 180deg 270deg, yellow 270deg);
            margin-right: 5px;
        }

        #taskbar-windows {
            flex-grow: 1;
            display: flex;
            gap: 2px;
            overflow: hidden;
        }

        .taskbar-item {
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            background: #c0c0c0;
            padding: 2px 5px;
            font-size: 11px;
            min-width: 100px;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .taskbar-item.active {
            border-color: #808080 #fff #fff #808080;
            background: #dfdfdf;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, #c0c0c0 2px, #c0c0c0 4px);
        }

        #clock {
            border: 2px solid;
            border-color: #808080 #fff #fff #808080;
            padding: 2px 10px;
            font-size: 11px;
            height: 100%;
            display: flex;
            align-items: center;
        }

        /* --- Start Menu --- */
        #start-menu {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 200px;
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            display: none; /* Hidden by default */
            flex-direction: row;
            z-index: 10000;
        }

        .start-sidebar {
            width: 25px;
            background: #000080;
            color: white;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            padding: 5px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: flex-end;
        }

        .start-items {
            flex-grow: 1;
            padding: 2px;
        }

        .start-item {
            padding: 8px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .start-item:hover {
            background-color: #000080;
            color: white;
        }

        /* --- Draggable Windows --- */
        .window {
            position: absolute;
            width: 400px;
            height: 300px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #000 #000 #fff;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
            display: flex;
            flex-direction: column;
            top: 50px;
            left: 50px;
        }

        .title-bar {
            background: #000080;
            color: white;
            padding: 2px 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            cursor: default;
        }

        .title-bar.inactive {
            background: #808080;
        }

        .close-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            font-weight: bold;
            font-size: 10px;
            width: 16px;
            height: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: black;
        }

        .close-btn:active {
            border-color: #808080 #fff #fff #808080;
        }

        .window-content {
            flex-grow: 1;
            background: white;
            border: 2px solid;
            border-color: #808080 #fff #fff #808080;
            margin: 2px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="desktop">
