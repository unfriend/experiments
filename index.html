<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holo-Directory v2.0</title>
    <style>
        /* --- Futuristic Reset & Variables --- */
        :root {
            --bg-dark: #090a0f;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff007f;
            --glass-bg: rgba(10, 12, 20, 0.7);
            --glass-border: rgba(0, 243, 255, 0.2);
            --glass-blur: blur(16px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            user-select: none;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: #e0eaff;
        }

        /* Animated Grid Background */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
        }

        /* --- Desktop Area --- */
        #desktop {
            position: relative;
            width: 100%;
            height: calc(100% - 70px);
            padding: 30px;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 25px;
        }

        /* --- Holographic Icons --- */
        .desktop-icon {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .desktop-icon:hover {
            transform: translateY(-5px) scale(1.05);
        }

        .icon-img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(0,243,255,0.1), rgba(255,0,127,0.1));
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }

        .icon-img::before {
            content: '/>';
            color: var(--neon-cyan);
            font-weight: 900;
            font-family: monospace;
            font-size: 18px;
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        .desktop-icon:hover .icon-img {
            box-shadow: 0 0 25px var(--neon-cyan);
            background: linear-gradient(135deg, rgba(0,243,255,0.3), rgba(255,0,127,0.3));
        }

        .icon-text {
            font-size: 12px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            text-align: center;
            word-wrap: break-word;
            max-width: 100%;
            letter-spacing: 0.5px;
        }

        /* --- Floating Dock (Taskbar) --- */
        #taskbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            height: 55px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 12px;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,243,255,0.05);
        }

        #start-btn {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            color: #000;
            font-weight: 800;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            transition: filter 0.2s, transform 0.1s;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        #start-btn:hover {
            filter: brightness(1.2);
        }

        #taskbar-windows {
            flex-grow: 1;
            display: flex;
            gap: 8px;
            max-width: 600px;
            overflow-x: auto;
        }

        /* Hide scrollbar for taskbar items */
        #taskbar-windows::-webkit-scrollbar { display: none; }

        .taskbar-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #aaa;
        }

        .taskbar-item.active {
            background: rgba(0, 243, 255, 0.15);
            border-color: var(--neon-cyan);
            color: #fff;
            box-shadow: 0 0 12px rgba(0,243,255,0.2);
        }

        #clock {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 14px;
            color: var(--neon-cyan);
            padding-left: 12px;
            border-left: 1px solid rgba(255,255,255,0.2);
        }

        /* --- Glassmorphism Start Menu --- */
        #start-menu {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: none;
            flex-direction: column;
            padding: 12px;
            z-index: 10000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,0,127,0.1);
        }

        .start-item {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #ddd;
            margin-bottom: 4px;
        }

        .start-item:hover {
            background: rgba(0, 243, 255, 0.2);
            color: #fff;
            padding-left: 22px;
        }

        hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 8px 0;
        }

        /* --- Cyberpunk Windows --- */
        .window {
            position: absolute;
            width: 600px;
            height: 400px;
            min-width: 300px;
            min-height: 200px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.05);
            transition: box-shadow 0.3s, border-color 0.3s;
        }

        .window:focus-within, .window:active {
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 20px rgba(0,243,255,0.2);
            border-color: var(--neon-cyan);
        }

        .title-bar {
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .title-bar.inactive {
            opacity: 0.6;
        }

        .title-controls {
            display: flex;
            gap: 8px;
        }

        .ctrl-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            color: #fff;
            background: rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .popout-btn:hover {
            background: rgba(0, 243, 255, 0.4);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .close-btn:hover {
            background: rgba(255, 0, 127, 0.6);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .window-content {
            flex-grow: 1;
            position: relative;
            background: #fff; /* Solid white so simple HTML files are readable */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #fff;
        }

        .window.is-dragging iframe, 
        .window.is-resizing iframe {
            pointer-events: none;
        }

        /* --- Resizing Grip --- */
        .resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 25px;
            height: 25px;
            cursor: se-resize;
            z-index: 10;
            background: linear-gradient(135deg, transparent 50%, rgba(0,243,255,0.4) 50%);
            border-bottom-right-radius: 12px;
            opacity: 0.5;
            transition: 0.2s;
        }

        .resize-handle:hover {
            opacity: 1;
            background: linear-gradient(135deg, transparent 50%, var(--neon-cyan) 50%);
        }
    </style>
</head>
<body>

    <div id="desktop">
        <!-- Loop 1: Jekyll Pages -->
        {% for page in site.html_pages %}
            {% if page.url != "/" %}
            <div class="desktop-icon" ondblclick="openWindow('{{ site.baseurl }}{{ page.url }}', '{{ page.name }}')">
                <div class="icon-img"></div>
                <div class="icon-text">{{ page.name }}</div>
            </div>
            {% endif %}
        {% endfor %}

        <!-- Loop 2: Static Files -->
        {% for file in site.static_files %}
            {% if file.extname == '.html' %}
            <div class="desktop-icon" ondblclick="openWindow('{{ site.baseurl }}{{ file.path }}', '{{ file.name }}')">
                <div class="icon-img"></div>
                <div class="icon-text">{{ file.name }}</div>
            </div>
            {% endif %}
        {% endfor %}
    </div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div class="start-item" onclick="alert('System operating normally.')">System Status</div>
        <div class="start-item" onclick="alert('No archives detected.')">Data Archives</div>
        <hr>
        <div class="start-item" onclick="toggleStartMenu()" style="color: var(--neon-pink);">Disconnect...</div>
    </div>

    <!-- Taskbar / Dock -->
    <div id="taskbar">
        <div id="start-btn" onclick="toggleStartMenu()">
            SYS
        </div>
        <div id="taskbar-windows"></div>
        <div id="clock">00:00 AM</div>
    </div>

    <script>
        let zIndexCounter = 100;
        let openWindowsCount = 0;

        // --- Clock ---
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').innerText = hours + ':' + minutes + ' ' + ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Start Menu ---
        function toggleStartMenu() {
            const menu = document.getElementById('start-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        document.addEventListener('click', function(event) {
            const startBtn = document.getElementById('start-btn');
            const startMenu = document.getElementById('start-menu');
            if (!startBtn.contains(event.target) && !startMenu.contains(event.target)) {
                startMenu.style.display = 'none';
            }
        });

        // --- Window Manager ---
        function openWindow(url, title) {
            openWindowsCount++;
            const winId = 'win-' + Date.now();
            
            const win = document.createElement('div');
            win.className = 'window';
            win.id = winId;
            win.style.zIndex = ++zIndexCounter;
            
            const offset = (openWindowsCount % 10) * 30;
            win.style.top = (80 + offset) + 'px';
            win.style.left = (80 + offset) + 'px';

            // New Title Bar includes an <a> tag targeting "_blank"
            win.innerHTML = `
                <div class="title-bar" id="${winId}-title">
                    <span>${title}</span>
                    <div class="title-controls">
                        <a href="${url}" target="_blank" class="ctrl-btn popout-btn" title="Open in new tab">↗</a>
                        <button class="ctrl-btn close-btn" title="Close window" onclick="closeWindow('${winId}')">✕</button>
                    </div>
                </div>
                <div class="window-content">
                    <iframe src="${url}"></iframe>
                </div>
                <div class="resize-handle" id="${winId}-resize"></div>
            `;

            win.addEventListener('mousedown', () => bringToFront(winId));
            
            document.getElementById('desktop').appendChild(win);
            createTaskbarItem(winId, title);
            
            makeDraggable(win, document.getElementById(`${winId}-title`));
            makeResizable(win, document.getElementById(`${winId}-resize`));
        }

        function closeWindow(winId) {
            document.getElementById(winId).remove();
            document.getElementById('task-' + winId).remove();
            openWindowsCount--;
        }

        function bringToFront(winId) {
            const win = document.getElementById(winId);
            if(win) win.style.zIndex = ++zIndexCounter;
            
            document.querySelectorAll('.title-bar').forEach(tb => tb.classList.add('inactive'));
            const activeTitleBar = document.getElementById(winId + '-title');
            if(activeTitleBar) activeTitleBar.classList.remove('inactive');

            document.querySelectorAll('.taskbar-item').forEach(tb => tb.classList.remove('active'));
            const taskBtn = document.getElementById('task-' + winId);
            if(taskBtn) taskBtn.classList.add('active');
        }

        function createTaskbarItem(winId, title) {
            const taskbarTasks = document.getElementById('taskbar-windows');
            const taskBtn = document.createElement('div');
            taskBtn.className = 'taskbar-item active';
            taskBtn.id = 'task-' + winId;
            taskBtn.innerText = title;
            taskBtn.onclick = () => bringToFront(winId);
            
            document.querySelectorAll('.taskbar-item').forEach(tb => tb.classList.remove('active'));
            taskbarTasks.appendChild(taskBtn);
        }

        // --- Dragging Logic ---
        function makeDraggable(elmnt, titleBar) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            titleBar.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                // Safeguard: Don't drag if clicking the control buttons (close/popout)
                if (e.target.closest('.ctrl-btn')) return;

                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                bringToFront(elmnt.id);
                elmnt.classList.add('is-dragging'); 
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                elmnt.classList.remove('is-dragging');
            }
        }

        // --- Resizing Logic ---
        function makeResizable(elmnt, resizer) {
            let startX, startY, startWidth, startHeight;

            resizer.addEventListener('mousedown', function(e) {
                e.preventDefault();
                startX = e.clientX;
                startY = e.clientY;
                startWidth = parseInt(document.defaultView.getComputedStyle(elmnt).width, 10);
                startHeight = parseInt(document.defaultView.getComputedStyle(elmnt).height, 10);
                
                document.documentElement.addEventListener('mousemove', doDrag, false);
                document.documentElement.addEventListener('mouseup', stopDrag, false);
                
                bringToFront(elmnt.id);
                elmnt.classList.add('is-resizing'); 
            });

            function doDrag(e) {
                elmnt.style.width = (startWidth + e.clientX - startX) + 'px';
                elmnt.style.height = (startHeight + e.clientY - startY) + 'px';
            }

            function stopDrag() {
                document.documentElement.removeEventListener('mousemove', doDrag, false);
                document.documentElement.removeEventListener('mouseup', stopDrag, false);
                elmnt.classList.remove('is-resizing');
            }
        }
    </script>
</body>
</html>
