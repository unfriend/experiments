<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 95 Directory</title>
    <style>
        /* --- Basic Reset & Win95 Styling --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "MS Sans Serif", "Microsoft Sans Serif", Arial, sans-serif;
            user-select: none;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #008080;
        }

        /* --- Desktop Area --- */
        #desktop {
            position: relative;
            width: 100%;
            height: calc(100% - 30px);
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 15px;
        }

        /* --- Desktop Icons --- */
        .desktop-icon {
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-align: center;
        }

        .icon-img {
            width: 32px;
            height: 32px;
            background-color: #fff;
            border: 1px solid #000;
            position: relative;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            margin-bottom: 4px;
        }

        .icon-img::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            border-width: 0 10px 10px 0;
            border-style: solid;
            border-color: #008080 #008080 #ccc #ccc;
        }

        .icon-text {
            color: white;
            font-size: 11px;
            padding: 2px;
            word-wrap: break-word;
            max-width: 100%;
        }

        .desktop-icon:active .icon-text {
            background-color: #000080;
            outline: 1px dotted #fff;
        }

        /* --- Taskbar --- */
        #taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background-color: #c0c0c0;
            border-top: 1px solid #fff;
            display: flex;
            align-items: center;
            padding: 2px;
            box-shadow: inset 0 1px #dfdfdf;
            z-index: 9999;
        }

        #start-btn {
            font-weight: bold;
            display: flex;
            align-items: center;
            padding: 2px 5px;
            height: 100%;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            background: #c0c0c0;
            cursor: pointer;
            margin-right: 5px;
        }

        #start-btn:active {
            border-color: #808080 #fff #fff #808080;
            padding: 3px 4px 1px 6px;
        }

        .win-logo {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: conic-gradient(red 90deg, green 90deg 180deg, blue 180deg 270deg, yellow 270deg);
            margin-right: 5px;
        }

        #taskbar-windows {
            flex-grow: 1;
            display: flex;
            gap: 2px;
            overflow: hidden;
        }

        .taskbar-item {
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            background: #c0c0c0;
            padding: 2px 5px;
            font-size: 11px;
            min-width: 100px;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .taskbar-item.active {
            border-color: #808080 #fff #fff #808080;
            background: #dfdfdf;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, #c0c0c0 2px, #c0c0c0 4px);
        }

        #clock {
            border: 2px solid;
            border-color: #808080 #fff #fff #808080;
            padding: 2px 10px;
            font-size: 11px;
            height: 100%;
            display: flex;
            align-items: center;
        }

        /* --- Start Menu --- */
        #start-menu {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 200px;
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            display: none;
            flex-direction: row;
            z-index: 10000;
        }

        .start-sidebar {
            width: 25px;
            background: #000080;
            color: white;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            padding: 5px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: flex-end;
        }

        .start-items {
            flex-grow: 1;
            padding: 2px;
        }

        .start-item {
            padding: 8px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .start-item:hover {
            background-color: #000080;
            color: white;
        }

        /* --- Windows --- */
        .window {
            position: absolute;
            width: 400px;
            height: 300px;
            min-width: 200px;
            min-height: 150px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #000 #000 #fff;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            background: #000080;
            color: white;
            padding: 2px 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            cursor: default;
        }

        .title-bar.inactive {
            background: #808080;
        }

        .close-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            font-weight: bold;
            font-size: 10px;
            width: 16px;
            height: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: black;
        }

        .close-btn:active {
            border-color: #808080 #fff #fff #808080;
        }

        .window-content {
            flex-grow: 1;
            background: white;
            border: 2px solid;
            border-color: #808080 #fff #fff #808080;
            margin: 2px;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Prevent iframe from stealing mouse events during drag/resize */
        .window.is-dragging iframe, 
        .window.is-resizing iframe {
            pointer-events: none;
        }

        /* --- Resizing Grip --- */
        .resize-handle {
            position: absolute;
            right: 2px;
            bottom: 2px;
            width: 12px;
            height: 12px;
            cursor: se-resize;
            z-index: 10;
            /* Classic Win95 grip texture */
            background-image: 
                linear-gradient(135deg, transparent 40%, #fff 40%, #fff 50%, #808080 50%, #808080 60%, transparent 60%),
                linear-gradient(135deg, transparent 70%, #fff 70%, #fff 80%, #808080 80%, #808080 90%, transparent 90%);
        }
    </style>
</head>
<body>

    <div id="desktop">
        <!-- Loop 1: Jekyll Pages -->
        {% for page in site.html_pages %}
            {% if page.url != "/" %}
            <div class="desktop-icon" ondblclick="openWindow('{{ site.baseurl }}{{ page.url }}', '{{ page.name }}')">
                <div class="icon-img"></div>
                <div class="icon-text">{{ page.name }}</div>
            </div>
            {% endif %}
        {% endfor %}

        <!-- Loop 2: Static Files -->
        {% for file in site.static_files %}
            {% if file.extname == '.html' %}
            <div class="desktop-icon" ondblclick="openWindow('{{ site.baseurl }}{{ file.path }}', '{{ file.name }}')">
                <div class="icon-img"></div>
                <div class="icon-text">{{ file.name }}</div>
            </div>
            {% endif %}
        {% endfor %}
    </div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div class="start-sidebar">Windows 95</div>
        <div class="start-items">
            <div class="start-item" onclick="alert('System operating normally.')">Programs</div>
            <div class="start-item" onclick="alert('No documents found.')">Documents</div>
            <hr>
            <div class="start-item" onclick="toggleStartMenu()">Shut Down...</div>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div id="start-btn" onclick="toggleStartMenu()">
            <span class="win-logo"></span> Start
        </div>
        <div id="taskbar-windows"></div>
        <div id="clock">00:00 AM</div>
    </div>

    <script>
        let zIndexCounter = 100;
        let openWindowsCount = 0;

        // --- Clock ---
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').innerText = hours + ':' + minutes + ' ' + ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Start Menu ---
        function toggleStartMenu() {
            const menu = document.getElementById('start-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        document.addEventListener('click', function(event) {
            const startBtn = document.getElementById('start-btn');
            const startMenu = document.getElementById('start-menu');
            if (!startBtn.contains(event.target) && !startMenu.contains(event.target)) {
                startMenu.style.display = 'none';
            }
        });

        // --- Window Manager ---
        function openWindow(url, title) {
            openWindowsCount++;
            const winId = 'win-' + Date.now();
            
            const win = document.createElement('div');
            win.className = 'window';
            win.id = winId;
            win.style.zIndex = ++zIndexCounter;
            
            const offset = (openWindowsCount % 10) * 20;
            win.style.top = (50 + offset) + 'px';
            win.style.left = (50 + offset) + 'px';

            // Notice the new resize-handle div inside the window
            win.innerHTML = `
                <div class="title-bar" id="${winId}-title">
                    <span>${title}</span>
                    <button class="close-btn" onclick="closeWindow('${winId}')">X</button>
                </div>
                <div class="window-content">
                    <iframe src="${url}"></iframe>
                </div>
                <div class="resize-handle" id="${winId}-resize"></div>
            `;

            win.addEventListener('mousedown', () => bringToFront(winId));
            
            document.getElementById('desktop').appendChild(win);
            createTaskbarItem(winId, title);
            
            // Apply Draggable and Resizable logic
            makeDraggable(win, document.getElementById(`${winId}-title`));
            makeResizable(win, document.getElementById(`${winId}-resize`));
        }

        function closeWindow(winId) {
            document.getElementById(winId).remove();
            document.getElementById('task-' + winId).remove();
            openWindowsCount--;
        }

        function bringToFront(winId) {
            const win = document.getElementById(winId);
            if(win) win.style.zIndex = ++zIndexCounter;
            
            document.querySelectorAll('.title-bar').forEach(tb => tb.classList.add('inactive'));
            const activeTitleBar = document.getElementById(winId + '-title');
            if(activeTitleBar) activeTitleBar.classList.remove('inactive');

            document.querySelectorAll('.taskbar-item').forEach(tb => tb.classList.remove('active'));
            const taskBtn = document.getElementById('task-' + winId);
            if(taskBtn) taskBtn.classList.add('active');
        }

        function createTaskbarItem(winId, title) {
            const taskbarTasks = document.getElementById('taskbar-windows');
            const taskBtn = document.createElement('div');
            taskBtn.className = 'taskbar-item active';
            taskBtn.id = 'task-' + winId;
            taskBtn.innerText = title;
            taskBtn.onclick = () => bringToFront(winId);
            
            document.querySelectorAll('.taskbar-item').forEach(tb => tb.classList.remove('active'));
            taskbarTasks.appendChild(taskBtn);
        }

        // --- Dragging Logic ---
        function makeDraggable(elmnt, titleBar) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            titleBar.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                bringToFront(elmnt.id);
                // Adds class to disable iframe pointer events so it doesn't swallow mouse events
                elmnt.classList.add('is-dragging'); 
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                elmnt.classList.remove('is-dragging');
            }
        }

        // --- Resizing Logic ---
        function makeResizable(elmnt, resizer) {
            let startX, startY, startWidth, startHeight;

            resizer.addEventListener('mousedown', function(e) {
                e.preventDefault();
                startX = e.clientX;
                startY = e.clientY;
                startWidth = parseInt(document.defaultView.getComputedStyle(elmnt).width, 10);
                startHeight = parseInt(document.defaultView.getComputedStyle(elmnt).height, 10);
                
                // Add event listeners to document so mouse doesn't lose the handle if moved quickly
                document.documentElement.addEventListener('mousemove', doDrag, false);
                document.documentElement.addEventListener('mouseup', stopDrag, false);
                
                bringToFront(elmnt.id);
                elmnt.classList.add('is-resizing'); 
            });

            function doDrag(e) {
                elmnt.style.width = (startWidth + e.clientX - startX) + 'px';
                elmnt.style.height = (startHeight + e.clientY - startY) + 'px';
            }

            function stopDrag() {
                document.documentElement.removeEventListener('mousemove', doDrag, false);
                document.documentElement.removeEventListener('mouseup', stopDrag, false);
                elmnt.classList.remove('is-resizing');
            }
        }
    </script>
</body>
</html>
