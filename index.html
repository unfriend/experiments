<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory Index</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }
        
        /* Classic link styling */
        a {
            color: blue;
            text-decoration: underline;
        }
        
        a:visited {
            color: purple;
        }

        ul {
            margin-top: 1rem;
            padding-left: 20px;
        }

        li {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>Index of /</h1>
    
    <ul>
        <!-- Loop 1: Jekyll Pages -->
        {% for page in site.html_pages %}
            {% if page.url != "/" %}
            <li>
                <a href="{{ site.baseurl }}{{ page.url }}">{{ page.name }}</a>
            </li>
            {% endif %}
        {% endfor %}

        <!-- Loop 2: Static Files -->
        {% for file in site.static_files %}
            {% if file.extname == '.html' %}
            <li>
                <a href="{{ site.baseurl }}{{ file.path }}">{{ file.name }}</a>
            </li>
            {% endif %}
        {% endfor %}
    </ul>

</body>
</html>
