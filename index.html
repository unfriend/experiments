<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="experiment-description" content="Overview directory of all experiments with links and auto loaded file descriptions.">
    <title>Directory Index</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }
        
        /* Classic link styling */
        a {
            color: blue;
            text-decoration: underline;
        }
        
        a:visited {
            color: purple;
        }

        ul {
            margin-top: 1rem;
            padding-left: 20px;
        }

        li {
            margin-bottom: 0.5rem;
        }

        .description {
            margin-left: 0.4rem;
            color: #444;
        }
    </style>
</head>
<body>
    <h1>list of experiments:</h1>
    
    <ul>
        <!-- Loop 1: Jekyll Pages -->
        {% for page in site.html_pages %}
            {% if page.url != "/" %}
            <li>
                <a href="{{ site.baseurl }}{{ page.url }}">{{ page.name }}</a>
            </li>
            {% endif %}
        {% endfor %}

        <!-- Loop 2: Static Files -->
        {% for file in site.static_files %}
            {% if file.extname == '.html' %}
            <li>
                <a href="{{ site.baseurl }}{{ file.path }}">{{ file.name }}</a>
            </li>
            {% endif %}
        {% endfor %}
    </ul>

    <script>
        (function() {
            const links = document.querySelectorAll('ul li a[href]');
            links.forEach((link) => {
                const href = link.getAttribute('href');
                if (!href) return;

                fetch(href)
                    .then((response) => {
                        if (!response.ok) {
                            throw new Error('Failed to load description');
                        }
                        return response.text();
                    })
                    .then((html) => {
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        const meta = doc.querySelector('meta[name="experiment-description"]');
                        const description = meta && meta.getAttribute('content');

                        if (!description) return;

                        const span = document.createElement('span');
                        span.className = 'description';
                        span.textContent = `— ${description}`;
                        link.insertAdjacentElement('afterend', span);
                    })
                    .catch(() => {
                        // Leave link without description when metadata is unavailable.
                    });
            });
        })();
    </script>

</body>
</html>
