<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NET_WALKER: Cyberpunk Pathfinder</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM (via CDNJS for better GitHub Pages compatibility) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #020205; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- Utility Classes ---
    class MinHeap {
      constructor() { this.heap = []; }
      insert(node) {
        this.heap.push(node);
        this.bubbleUp(this.heap.length - 1);
      }
      extractMin() {
        if (this.heap.length === 0) return null;
        if (this.heap.length === 1) return this.heap.pop();
        const min = this.heap[0];
        this.heap[0] = this.heap.pop();
        this.sinkDown(0);
        return min;
      }
      bubbleUp(index) {
        while (index > 0) {
          const parentIndex = Math.floor((index - 1) / 2);
          if (this.heap[parentIndex].priority <= this.heap[index].priority) break;
          const temp = this.heap[parentIndex];
          this.heap[parentIndex] = this.heap[index];
          this.heap[index] = temp;
          index = parentIndex;
        }
      }
      sinkDown(index) {
        const length = this.heap.length;
        while (true) {
          let leftChild = 2 * index + 1;
          let rightChild = 2 * index + 2;
          let smallest = index;

          if (leftChild < length && this.heap[leftChild].priority < this.heap[smallest].priority) {
            smallest = leftChild;
          }
          if (rightChild < length && this.heap[rightChild].priority < this.heap[smallest].priority) {
            smallest = rightChild;
          }
          if (smallest === index) break;
          const temp = this.heap[index];
          this.heap[index] = this.heap[smallest];
          this.heap[smallest] = temp;
          index = smallest;
        }
      }
      isEmpty() { return this.heap.length === 0; }
    }

    // --- Cyberpunk Styles ---
    const styles = `
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

      .cyberpunk-font { font-family: 'Share Tech Mono', monospace; }
      
      .cyber-title {
        font-family: 'Rajdhani', sans-serif;
        text-transform: uppercase;
        text-shadow: 0 0 5px #00f3ff, 0 0 10px #00f3ff;
      }

      .cyber-panel {
        background: rgba(10, 10, 20, 0.85);
        border: 1px solid #00f3ff;
        box-shadow: 0 0 10px rgba(0, 243, 255, 0.2), inset 0 0 20px rgba(0, 243, 255, 0.05);
        backdrop-filter: blur(5px);
      }

      .cyber-button {
        background: transparent;
        color: #00f3ff;
        border: 1px solid #00f3ff;
        text-transform: uppercase;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
      }
      
      .cyber-button:hover:not(:disabled) {
        background: rgba(0, 243, 255, 0.2);
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
        text-shadow: 0 0 5px #00f3ff;
      }

      .cyber-button:disabled {
        border-color: #333;
        color: #555;
        cursor: not-allowed;
      }

      .cyber-button.active {
        background: #00f3ff;
        color: #000;
        box-shadow: 0 0 20px #00f3ff;
      }
      
      .cyber-button.danger {
        color: #ff003c;
        border-color: #ff003c;
      }
      .cyber-button.danger:hover:not(:disabled) {
        background: rgba(255, 0, 60, 0.2);
        box-shadow: 0 0 15px rgba(255, 0, 60, 0.6);
        text-shadow: 0 0 5px #ff003c;
      }

      .cyber-slider {
        -webkit-appearance: none;
        width: 100%;
        height: 4px;
        background: #1a1a2e;
        outline: none;
        border: 1px solid #00f3ff;
        box-shadow: 0 0 5px rgba(0, 243, 255, 0.3);
      }

      .cyber-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        background: #fdfd96;
        cursor: pointer;
        box-shadow: 0 0 10px #fdfd96;
        border-radius: 0;
      }

      .cyber-checkbox {
        appearance: none;
        width: 14px;
        height: 14px;
        border: 1px solid #00f3ff;
        background: rgba(0, 243, 255, 0.1);
        cursor: pointer;
        position: relative;
        outline: none;
      }
      .cyber-checkbox:checked::after {
        content: '';
        position: absolute;
        top: 2px; left: 2px; width: 8px; height: 8px;
        background: #00f3ff;
        box-shadow: 0 0 5px #00f3ff;
      }

      .scanline {
        width: 100%;
        height: 100px;
        z-index: 50;
        position: absolute;
        pointer-events: none;
        background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,243,255,0.1) 50%, rgba(0,0,0,0) 100%);
        animation: scan 8s linear infinite;
      }

      @keyframes scan {
        0% { top: -100px; }
        100% { top: 100%; }
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #050510; border-left: 1px solid #1a1a2e; }
      ::-webkit-scrollbar-thumb { background: #00f3ff; }
      ::-webkit-scrollbar-thumb:hover { background: #fff; }
    `;

    function App() {
      const canvasRef = useRef(null);
      const graphRef = useRef({ nodes: [], edges: [], adjList: new Map() });
      const searchStateRef = useRef({
        status: 'idle',
        frontier: new MinHeap(),
        cameFrom: {},
        costSoFar: {},
        visited: new Set(),
        path: [],
        startNode: null,
        targetNode: null,
        currentCheckingNode: null
      });
      const animationRef = useRef(null);
      const containerRef = useRef(null);
      const lastStepTimeRef = useRef(0);
      const stepSearchRef = useRef(null);
      const flagsRef = useRef({ loopForever: false, randomNodes: false });

      const [config, setConfig] = useState({
        nodesCount: 300,
        communities: 4,
        intraProbability: 0.15,
        interProbability: 0.01,
        speed: 60
      });
      const [algo, setAlgo] = useState('A*');
      const [status, setStatus] = useState('idle');
      const [stats, setStats] = useState({ nodesVisited: 0, pathLength: 0 });
      const [loopForever, setLoopForever] = useState(false);
      const [randomNodesOnRun, setRandomNodesOnRun] = useState(false);

      useEffect(() => { flagsRef.current.loopForever = loopForever; }, [loopForever]);
      useEffect(() => { flagsRef.current.randomNodes = randomNodesOnRun; }, [randomNodesOnRun]);

      const generateGraph = useCallback(() => {
        if (!canvasRef.current || !containerRef.current) return;
        
        const rect = containerRef.current.getBoundingClientRect();
        canvasRef.current.width = rect.width;
        canvasRef.current.height = rect.height;
        
        const width = rect.width;
        const height = rect.height;
        const { nodesCount, communities, intraProbability, interProbability } = config;

        const nodes = [];
        const edges = [];
        const adjList = new Map();

        const centers = Array.from({ length: communities }).map(() => ({
          x: width * 0.15 + Math.random() * width * 0.7,
          y: height * 0.15 + Math.random() * height * 0.7,
        }));

        for (let i = 0; i < nodesCount; i++) {
          const comm = i % communities;
          const center = centers[comm];
          
          const angle = Math.random() * Math.PI * 2;
          const radius = (Math.random() + Math.random() + Math.random()) / 3 * (width / (communities * 1.2)); 
          
          nodes.push({
            id: i,
            x: Math.max(20, Math.min(width - 20, center.x + Math.cos(angle) * radius)),
            y: Math.max(20, Math.min(height - 20, center.y + Math.sin(angle) * radius)),
            community: comm,
          });
          adjList.set(i, []);
        }

        for (let i = 0; i < nodesCount; i++) {
          for (let j = i + 1; j < nodesCount; j++) {
            const dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
            if (dist > width / 2.5) continue;

            const sameComm = nodes[i].community === nodes[j].community;
            const baseProb = sameComm ? intraProbability : interProbability;
            const distanceFactor = Math.max(0, 1 - (dist / (width / 3)));
            const finalProb = baseProb * distanceFactor;

            if (Math.random() < finalProb) {
              edges.push({ source: i, target: j, weight: dist });
              adjList.get(i).push({ target: j, weight: dist });
              adjList.get(j).push({ target: i, weight: dist });
            }
          }
        }

        const connected = new Set([0]);
        let connectedCount = 1;
        const queue = [0];
        while(queue.length > 0) {
            const curr = queue.shift();
            for(let neighbor of adjList.get(curr)) {
                if(!connected.has(neighbor.target)) {
                    connected.add(neighbor.target);
                    queue.push(neighbor.target);
                    connectedCount++;
                }
            }
        }

        if (connectedCount < nodesCount) {
            for(let i=0; i<nodesCount; i++) {
                if(!connected.has(i)) {
                    let nearest = -1;
                    let minDist = Infinity;
                    for(let c of connected) {
                         const dist = Math.hypot(nodes[i].x - nodes[c].x, nodes[i].y - nodes[c].y);
                         if(dist < minDist) { minDist = dist; nearest = c; }
                    }
                    if (nearest !== -1) {
                        edges.push({ source: i, target: nearest, weight: minDist });
                        adjList.get(i).push({ target: nearest, weight: minDist });
                        adjList.get(nearest).push({ target: i, weight: minDist });
                        connected.add(i);
                    }
                }
            }
        }

        graphRef.current = { nodes, edges, adjList };
        
        resetSearch();
        const startNode = nodes[Math.floor(Math.random() * nodes.length)];
        let targetNode = nodes[Math.floor(Math.random() * nodes.length)];
        while(targetNode.id === startNode.id && nodes.length > 1) {
          targetNode = nodes[Math.floor(Math.random() * nodes.length)];
        }
        
        searchStateRef.current.startNode = startNode;
        searchStateRef.current.targetNode = targetNode;

        draw();
      }, [config]);

      useEffect(() => {
        const handleResize = () => {
            if(status === 'idle' || status === 'found' || status === 'no_path') {
                 generateGraph();
            }
        };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [generateGraph, status]);

      const draw = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const { width, height } = canvas;
        const { nodes, edges } = graphRef.current;
        const { visited, path, startNode, targetNode, currentCheckingNode, frontier } = searchStateRef.current;

        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, width, height);

        ctx.strokeStyle = 'rgba(0, 243, 255, 0.03)';
        ctx.lineWidth = 1;
        for(let i=0; i<width; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke(); }
        for(let i=0; i<height; i+=40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke(); }

        ctx.lineWidth = 0.5;
        ctx.strokeStyle = 'rgba(0, 243, 255, 0.15)';
        ctx.beginPath();
        for (const edge of edges) {
          const n1 = nodes[edge.source];
          const n2 = nodes[edge.target];
          ctx.moveTo(n1.x, n1.y);
          ctx.lineTo(n2.x, n2.y);
        }
        ctx.stroke();

        ctx.lineWidth = 1.5;
        ctx.strokeStyle = 'rgba(180, 0, 255, 0.4)';
        ctx.beginPath();
        for (const [nodeId, parentId] of Object.entries(searchStateRef.current.cameFrom)) {
            if (parentId !== null && parentId !== undefined) {
                 const n1 = nodes[nodeId];
                 const n2 = nodes[parentId];
                 if(n1 && n2) {
                     ctx.moveTo(n1.x, n1.y);
                     ctx.lineTo(n2.x, n2.y);
                 }
            }
        }
        ctx.stroke();

        if (path.length > 0) {
          ctx.shadowBlur = 15;
          ctx.shadowColor = '#00ffaa';
          ctx.lineWidth = 4;
          ctx.strokeStyle = '#00ffaa';
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.beginPath();
          for (let i = 0; i < path.length; i++) {
            const n = nodes[path[i]];
            if (i === 0) ctx.moveTo(n.x, n.y);
            else ctx.lineTo(n.x, n.y);
          }
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        for (const node of nodes) {
          let radius = 2.5;
          let fillStyle = `hsl(${(node.community * 360) / config.communities}, 80%, 60%)`;
          let glowing = false;

          if (node.id === startNode?.id) {
            radius = 8;
            fillStyle = '#00f3ff';
            glowing = true;
          } else if (node.id === targetNode?.id) {
            radius = 8;
            fillStyle = '#ff003c';
            glowing = true;
          } else if (path.includes(node.id)) {
            radius = 4;
            fillStyle = '#00ffaa';
            glowing = true;
          } else if (node.id === currentCheckingNode) {
            radius = 6;
            fillStyle = '#fdfd96';
            glowing = true;
          } else if (visited.has(node.id)) {
            radius = 3;
            fillStyle = 'rgba(180, 0, 255, 0.8)';
          }

          ctx.beginPath();
          ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
          ctx.fillStyle = fillStyle;
          
          if (glowing) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = fillStyle;
          }
          
          ctx.fill();
          ctx.shadowBlur = 0;
          
          if(node.id === targetNode?.id) {
              ctx.strokeStyle = '#ff003c';
              ctx.lineWidth = 1;
              ctx.beginPath(); ctx.arc(node.x, node.y, 14 + Math.sin(Date.now()/200)*2, 0, Math.PI * 2); ctx.stroke();
              ctx.beginPath(); ctx.arc(node.x, node.y, 20, 0, Math.PI * 2); ctx.stroke();
          }
          if(node.id === startNode?.id) {
            ctx.strokeStyle = '#00f3ff';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(node.x, node.y, 14, 0, Math.PI * 2); ctx.stroke();
          }
        }
      }, [config.communities]);

      const heuristic = (nodeId, targetId) => {
        const n1 = graphRef.current.nodes[nodeId];
        const n2 = graphRef.current.nodes[targetId];
        return Math.hypot(n1.x - n2.x, n1.y - n2.y);
      };

      const reconstructPath = (endId) => {
        const state = searchStateRef.current;
        let curr = endId;
        const path = [];
        let length = 0;
        while (curr !== null) {
          path.unshift(curr);
          const parent = state.cameFrom[curr];
          if (parent !== null) {
               const edge = graphRef.current.adjList.get(parent).find(e => e.target === curr);
               if(edge) length += edge.weight;
          }
          curr = parent;
        }
        state.path = path;
        setStats({ nodesVisited: state.visited.size, pathLength: Math.round(length) });
      };

      const stepSearch = useCallback((timestamp) => {
        const state = searchStateRef.current;
        const { adjList } = graphRef.current;

        if (!lastStepTimeRef.current) lastStepTimeRef.current = timestamp;

        let stepsToRun = 0;
        let shouldRun = false;

        if (config.speed < 50) {
            const delayMs = (50 - config.speed) * 30;
            if (timestamp - lastStepTimeRef.current >= delayMs) {
                stepsToRun = 1;
                shouldRun = true;
                lastStepTimeRef.current = timestamp;
            }
        } else {
            stepsToRun = Math.max(1, config.speed - 49);
            shouldRun = true;
        }

        if (shouldRun) {
            for (let i = 0; i < stepsToRun; i++) {
                if (state.frontier.isEmpty()) {
                    state.status = 'no_path';
                    setStatus('no_path');
                    cancelAnimationFrame(animationRef.current);
                    return;
                }

                const currentItem = state.frontier.extractMin();
                const current = currentItem.id;
                state.currentCheckingNode = current;

                if (current === state.targetNode.id) {
                    reconstructPath(current);
                    state.status = 'found';
                    state.currentCheckingNode = null;
                    setStatus('found');
                    cancelAnimationFrame(animationRef.current);
                    draw();
                    return;
                }

                if (state.visited.has(current)) continue;
                state.visited.add(current);

                const neighbors = adjList.get(current);
                if(neighbors) {
                    for (let next of neighbors) {
                        if (state.visited.has(next.target)) continue;

                        const newCost = state.costSoFar[current] + next.weight;
                        if (!(next.target in state.costSoFar) || newCost < state.costSoFar[next.target]) {
                            state.costSoFar[next.target] = newCost;
                            state.cameFrom[next.target] = current;
                            
                            const priority = newCost + (algo === 'A*' ? heuristic(next.target, state.targetNode.id) : 0);
                            state.frontier.insert({ id: next.target, priority });
                        }
                    }
                }
            }
            
            setStats({ nodesVisited: state.visited.size, pathLength: 0 });
            draw();
        }
        
        if (state.status === 'running') {
            animationRef.current = requestAnimationFrame((t) => stepSearchRef.current(t));
        }
      }, [algo, config.speed, draw]);

      useEffect(() => { stepSearchRef.current = stepSearch; }, [stepSearch]);

      const resetSearch = useCallback(() => {
        cancelAnimationFrame(animationRef.current);
        const state = searchStateRef.current;
        state.status = 'idle';
        setStatus('idle');
        state.frontier = new MinHeap();
        state.cameFrom = {};
        state.costSoFar = {};
        state.visited = new Set();
        state.path = [];
        state.currentCheckingNode = null;
        setStats({ nodesVisited: 0, pathLength: 0 });
        draw();
      }, [draw]);

      const startSearch = useCallback(() => {
        const state = searchStateRef.current;
        const { nodes } = graphRef.current;

        if (flagsRef.current.randomNodes && nodes.length > 0) {
            state.startNode = nodes[Math.floor(Math.random() * nodes.length)];
            let targetNode = nodes[Math.floor(Math.random() * nodes.length)];
            while(targetNode.id === state.startNode.id && nodes.length > 1) {
                targetNode = nodes[Math.floor(Math.random() * nodes.length)];
            }
            state.targetNode = targetNode;
            draw();
        }

        if (!state.startNode || !state.targetNode) return;

        if (state.status === 'idle' || state.status === 'found' || state.status === 'no_path') {
            state.status = 'running';
            setStatus('running');
            state.frontier = new MinHeap();
            state.frontier.insert({ id: state.startNode.id, priority: 0 });
            state.cameFrom = { [state.startNode.id]: null };
            state.costSoFar = { [state.startNode.id]: 0 };
            state.visited = new Set();
            state.path = [];
            state.currentCheckingNode = null;
            setStats({ nodesVisited: 0, pathLength: 0 });
        } else if (state.status === 'paused') {
            state.status = 'running';
            setStatus('running');
        }
        
        lastStepTimeRef.current = performance.now();
        animationRef.current = requestAnimationFrame((t) => stepSearchRef.current(t));
      }, [draw]);

      useEffect(() => {
        let timer;
        if ((status === 'found' || status === 'no_path') && loopForever) {
            timer = setTimeout(() => {
                resetSearch();
                startSearch();
            }, 1500);
        }
        return () => clearTimeout(timer);
      }, [status, loopForever, resetSearch, startSearch]);

      const pauseSearch = () => {
        searchStateRef.current.status = 'paused';
        setStatus('paused');
        cancelAnimationFrame(animationRef.current);
      };

      const handleCanvasClick = (e) => {
        if (status === 'running') return;
        
        const rect = canvasRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        let closestNode = null;
        let minDist = Infinity;
        for (const node of graphRef.current.nodes) {
            const dist = Math.hypot(node.x - x, node.y - y);
            if (dist < minDist && dist < 20) {
                minDist = dist;
                closestNode = node;
            }
        }

        if (closestNode) {
            const state = searchStateRef.current;
            if (e.shiftKey) {
                state.startNode = closestNode;
            } else {
                state.targetNode = closestNode;
            }
            resetSearch();
        }
      };

      useEffect(() => {
        generateGraph();
        return () => cancelAnimationFrame(animationRef.current);
      }, [generateGraph]);

      useEffect(() => {
         let glowFrame;
         const animateGlow = () => {
             if (status !== 'running') {
                draw();
             }
             glowFrame = requestAnimationFrame(animateGlow);
         };
         animateGlow();
         return () => cancelAnimationFrame(glowFrame);
      }, [draw, status]);

      // STYLES EXTRACTED TO AVOID JEKYLL TEMPLATE ERRORS
      const buttonDynamicStyle = { boxShadow: status === 'idle' ? '0 0 10px rgba(0, 243, 255, 0.5)' : 'none' };
      const sliderGlowStyle = { boxShadow: '0 0 5px rgba(253, 253, 150, 0.5)' };
      const crtOverlayStyle = {
         background: 'radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.6) 100%)',
         boxShadow: 'inset 0 0 100px rgba(0,0,0,0.9)'
      };

      return (
        <div className="flex h-screen w-full bg-[#020205] text-[#00f3ff] cyberpunk-font overflow-hidden relative selection:bg-[#ff003c] selection:text-white">
          <style>{styles}</style>
          <div className="scanline"></div>

          {/* Control Panel (Left) */}
          <div className="w-80 h-full p-6 flex flex-col gap-6 cyber-panel relative z-10 overflow-y-auto">
            <div className="flex items-center justify-between border-b border-[#00f3ff]/30 pb-4">
              <h1 className="text-3xl font-bold cyber-title text-white tracking-widest">NET_WALKER</h1>
              <span className="text-xs bg-[#00f3ff]/20 px-2 py-1 rounded border border-[#00f3ff]/50">v2.0.4</span>
            </div>

            {/* Algorithm Selection */}
            <div className="flex flex-col gap-2">
              <span className="text-sm text-gray-400 uppercase tracking-widest">Protocol</span>
              <div className="flex gap-2">
                {['Dijkstra', 'A*'].map((a) => (
                  <button
                    key={a}
                    onClick={() => { setAlgo(a); resetSearch(); }}
                    disabled={status === 'running'}
                    className={`flex-1 py-2 text-sm font-bold cyber-button ${algo === a ? 'active' : ''}`}
                  >
                    {a}
                  </button>
                ))}
              </div>
            </div>

            {/* Action Controls */}
            <div className="flex flex-col gap-2">
               <span className="text-sm text-gray-400 uppercase tracking-widest">Execution</span>
                {status === 'idle' || status === 'paused' || status === 'found' || status === 'no_path' ? (
                    <button onClick={startSearch} className="w-full py-3 cyber-button text-lg font-bold tracking-widest"
                            style={buttonDynamicStyle}>
                      {status === 'paused' ? 'RESUME_SYS()' : status==='found' || status==='no_path' ? 'RESTART_SYS()' : 'INIT_SEARCH()'}
                    </button>
                ) : (
                    <button onClick={pauseSearch} className="w-full py-3 cyber-button danger text-lg font-bold tracking-widest">
                      HALT_EXECUTION()
                    </button>
                )}
                <button onClick={resetSearch} disabled={status === 'running'} className="w-full py-2 cyber-button text-sm">
                    CLEAR_MEMORY()
                </button>
            </div>

            {/* Status Screen */}
            <div className="bg-[#050510] border border-[#00f3ff]/30 p-4 relative">
                <div className="absolute top-0 left-0 w-2 h-2 border-t border-l border-[#00f3ff]"></div>
                <div className="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-[#00f3ff]"></div>
                
                <div className="flex justify-between items-end mb-2">
                    <span className="text-xs text-gray-500 uppercase">SYS_STATUS</span>
                    <span className={`text-sm font-bold ${
                        status === 'running' ? 'text-yellow-400 animate-pulse' : 
                        status === 'found' ? 'text-[#00ffaa]' : 
                        status === 'no_path' ? 'text-[#ff003c]' : 'text-[#00f3ff]'
                    }`}>
                        [{status.toUpperCase()}]
                    </span>
                </div>
                <div className="flex justify-between text-sm">
                    <span className="text-gray-400">NODES_VISITED:</span>
                    <span className="font-mono text-white">{stats.nodesVisited.toString().padStart(4, '0')}</span>
                </div>
                <div className="flex justify-between text-sm mt-1">
                    <span className="text-gray-400">PATH_LENGTH:</span>
                    <span className="font-mono text-[#00ffaa]">{stats.pathLength > 0 ? stats.pathLength : '----'}</span>
                </div>
            </div>

            {/* Graph Parameters */}
            <div className="flex flex-col gap-4 flex-grow border-t border-[#00f3ff]/30 pt-4">
              <span className="text-sm text-gray-400 uppercase tracking-widest">Topology_Params</span>
              
              <div className="flex flex-col gap-1">
                <div className="flex justify-between text-xs">
                  <span>NODES [N]</span>
                  <span className="text-white">{config.nodesCount}</span>
                </div>
                <input type="range" min="50" max="800" step="10" value={config.nodesCount}
                       onChange={(e) => setConfig(prev => Object.assign({}, prev, {nodesCount: parseInt(e.target.value)}))}
                       disabled={status === 'running'} className="cyber-slider" />
              </div>

              <div className="flex flex-col gap-1">
                <div className="flex justify-between text-xs">
                  <span>CLUSTERS [C]</span>
                  <span className="text-white">{config.communities}</span>
                </div>
                <input type="range" min="1" max="10" value={config.communities}
                       onChange={(e) => setConfig(prev => Object.assign({}, prev, {communities: parseInt(e.target.value)}))}
                       disabled={status === 'running'} className="cyber-slider" />
              </div>

              <div className="flex flex-col gap-1">
                <div className="flex justify-between text-xs">
                  <span>INTRA_LINK_PROB</span>
                  <span className="text-white">{config.intraProbability.toFixed(2)}</span>
                </div>
                <input type="range" min="0.05" max="0.5" step="0.01" value={config.intraProbability}
                       onChange={(e) => setConfig(prev => Object.assign({}, prev, {intraProbability: parseFloat(e.target.value)}))}
                       disabled={status === 'running'} className="cyber-slider" />
              </div>

              <div className="flex flex-col gap-1">
                <div className="flex justify-between text-xs">
                  <span>INTER_LINK_PROB</span>
                  <span className="text-white">{config.interProbability.toFixed(3)}</span>
                </div>
                <input type="range" min="0" max="0.1" step="0.005" value={config.interProbability}
                       onChange={(e) => setConfig(prev => Object.assign({}, prev, {interProbability: parseFloat(e.target.value)}))}
                       disabled={status === 'running'} className="cyber-slider" />
              </div>

              <div className="flex flex-col gap-1 mt-4">
                <div className="flex justify-between text-xs text-[#fdfd96]">
                  <span>OVERCLOCK_SPEED</span>
                  <span>{config.speed < 50 ? `SLOW (${50 - config.speed})` : `${config.speed - 49}x`}</span>
                </div>
                <input type="range" min="1" max="100" value={config.speed}
                       onChange={(e) => setConfig(prev => Object.assign({}, prev, {speed: parseInt(e.target.value)}))}
                       className="cyber-slider" style={sliderGlowStyle}/>
              </div>

              <div className="flex flex-col gap-2 mt-2">
                <label className="flex items-center gap-2 text-xs cursor-pointer">
                  <input type="checkbox" checked={loopForever} onChange={e => setLoopForever(e.target.checked)} className="cyber-checkbox" />
                  <span className="text-gray-300">AUTO_RESTART_LOOP</span>
                </label>
                <label className="flex items-center gap-2 text-xs cursor-pointer">
                  <input type="checkbox" checked={randomNodesOnRun} onChange={e => setRandomNodesOnRun(e.target.checked)} className="cyber-checkbox" />
                  <span className="text-gray-300">RANDOM_NODES_ON_EXEC</span>
                </label>
              </div>
              
              <button onClick={generateGraph} disabled={status === 'running'} 
                      className="w-full py-2 mt-2 cyber-button border-dashed text-xs tracking-widest">
                 REGENERATE_TOPOLOGY()
              </button>
            </div>

            <div className="text-[10px] text-gray-600 uppercase mt-auto text-center border-t border-[#00f3ff]/20 pt-2">
                L-CLICK: Set Target Node<br/>
                SHIFT + L-CLICK: Set Source Node
            </div>
          </div>

          {/* Main Canvas Area */}
          <div className="flex-grow relative cursor-crosshair" ref={containerRef} onClick={handleCanvasClick}>
            <canvas
              ref={canvasRef}
              className="absolute inset-0 w-full h-full"
            />
            {/* CRT Overlay Effect */}
            <div className="absolute inset-0 pointer-events-none" style={crtOverlayStyle}>
            </div>
          </div>
        </div>
      );
    }

    // Render the React app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
