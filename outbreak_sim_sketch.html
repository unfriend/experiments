          // Oceania
          { id: 'syd', name: 'Sydney', lat: -33.86, lon: 151.20, pop: 5.3, hub: true },
          { id: 'mel', name: 'Melbourne', lat: -37.81, lon: 144.96, pop: 5.0, hub: true },

          { id: 'per', name: 'Perth', lat: -31.95, lon: 115.86, pop: 2.1, hub: false },
          { id: 'pom', name: 'Port Moresby', lat: -9.44, lon: 147.18, pop: 0.3, hub: false },
          { id: 'fji', name: 'Suva', lat: -18.12, lon: 178.45, pop: 0.1, hub: false }
        ];

        // --- UTILS ---
        const dist = (c1, c2) => Math.sqrt(Math.pow(c1.lat - c2.lat, 2) + Math.pow(c1.lon - c2.lon, 2));

        const generateNetwork = (cities) => {
          const edges = [];
          const addEdge = (source, target, type) => {
            if (!edges.some(e => (e.source === source.id && e.target === target.id) || (e.source === target.id && e.target === source.id))) {
              edges.push({ source: source.id, target: target.id, type, weight: type === 'hub' ? 1.5 : 1 });
            }
          };

          const hubs = cities.filter(c => c.hub);
          // Connect all hubs to each other (major flight routes)
          for (let i = 0; i < hubs.length; i++) {
            for (let j = i + 1; j < hubs.length; j++) {
              if (dist(hubs[i], hubs[j]) < 120 || Math.random() > 0.4) {
                addEdge(hubs[i], hubs[j], 'hub');
              }
            }
          }

          // Connect every city to its 2-3 nearest neighbors and 1 nearest hub
          cities.forEach(city => {
            let sortedByDist = [...cities].filter(c => c.id !== city.id).sort((a, b) => dist(city, a) - dist(city, b));
            addEdge(city, sortedByDist[0], 'regional');
            addEdge(city, sortedByDist[1], 'regional');
            if (Math.random() > 0.5) addEdge(city, sortedByDist[2], 'regional');

            if (!city.hub) {
              let nearestHub = [...hubs].sort((a, b) => dist(city, a) - dist(city, b))[0];
              addEdge(city, nearestHub, 'feeder');
            }
          });

          return edges;
        };

        const EDGES = generateNetwork(CITIES);

        // Map projection constants
        const project = (lat, lon, width, height) => {
          const mapW = width;
          const mapH = width / 2; // Equirectangular aspect ratio 2:1
          const yOffset = (height - mapH) / 2;
          const x = (lon + 180) * (mapW / 360);
          const y = (90 - lat) * (mapH / 180) + yOffset;
          return { x, y }; 
        };

        // Simulation Constants
        const S = 0; // Susceptible
        const I = 1; // Infected
        const R = 2; // Recovered

        function App() {
          const canvasRef = useRef(null);
          const chartRef = useRef(null);
          const [simulationState, setSimulationState] = useState('setup'); // setup, playing, paused
          const [stats, setStats] = useState({ s: CITIES.length, i: 0, r: 0, day: 0 });
          const [selectedNode, setSelectedNode] = useState(null);
          const [hoveredNode, setHoveredNode] = useState(null);
          
          // Params
          const [txRate, setTxRate] = useState(0.12);
          const [recoveryDays, setRecoveryDays] = useState(14);
          const [simSpeed, setSimSpeed] = useState(0.8);

          // Zoom & Pan State
          const transform = useRef({ x: 0, y: 0, k: 1 });
          const isDragging = useRef(false);
          const lastMouse = useRef({ x: 0, y: 0 });
          const [mapGeoJson, setMapGeoJson] = useState(null);

          useEffect(() => {
            fetch(WORLD_GEOJSON_URL)
              .then(res => res.json())
              .then(data => setMapGeoJson(data))
              .catch(err => console.error("Failed to load map", err));
          }, []);

          // Mutable Simulation Data (avoids react renders during fast loops)
          const simData = useRef({
            nodes: CITIES.map(c => ({ ...c, state: S, infectionDay: -1 })),
            edges: EDGES,
            particles: [], // { sourceId, targetId, progress }
            day: 0,
            tickCounter: 0,
            history: [{ s: CITIES.length, i: 0, r: 0, day: 0 }]
          });

          // --- RENDERING LOOP ---
          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let animationFrameId;

            const render = () => {
              const width = canvas.clientWidth;
              const height = canvas.clientHeight;
              if (canvas.width !== width || canvas.height !== height) {
                canvas.width = width;
                canvas.height = height;
              }

              ctx.clearRect(0, 0, width, height);

              // Apply Zoom & Pan
              ctx.save();
              ctx.translate(transform.current.x, transform.current.y);
              ctx.scale(transform.current.k, transform.current.k);

              // Draw World Map Background
              if (mapGeoJson) {
                ctx.strokeStyle = '#1e293b'; 
                ctx.fillStyle = '#0f172a'; 
                ctx.lineWidth = 1 / transform.current.k;

                mapGeoJson.features.forEach(feature => {
                  const drawPolygon = (coords) => {
                    ctx.beginPath();
                    coords.forEach((coord, i) => {
                      const p = project(coord[1], coord[0], width, height);
                      if (i === 0) ctx.moveTo(p.x, p.y);
                      else ctx.lineTo(p.x, p.y);
                    });
                    ctx.fill();
                    ctx.stroke();
                  };

                  if (feature.geometry.type === 'Polygon') {
                    feature.geometry.coordinates.forEach(drawPolygon);
                  } else if (feature.geometry.type === 'MultiPolygon') {
                    feature.geometry.coordinates.forEach(polygon => polygon.forEach(drawPolygon));
                  }
                });
              }

              // Map positions mapped to current canvas size
              const getPos = (nodeId) => {
                const node = simData.current.nodes.find(n => n.id === nodeId);
                return project(node.lat, node.lon, width, height);
              };

              // Draw Edges
              simData.current.edges.forEach(edge => {
                const p1 = getPos(edge.source);
                const p2 = getPos(edge.target);
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                // Simple curve
                const cx = (p1.x + p2.x) / 2;
                const cy = (p1.y + p2.y) / 2 - Math.abs(p1.x - p2.x) * 0.15; // Arc
                ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);
                ctx.strokeStyle = edge.type === 'hub' ? 'rgba(71, 85, 105, 0.4)' : 'rgba(51, 65, 85, 0.2)';
                ctx.lineWidth = edge.weight / transform.current.k;
                ctx.stroke();
              });

              // Draw active infection particles
              simData.current.particles.forEach(p => {
                const p1 = getPos(p.sourceId);
                const p2 = getPos(p.targetId);
                const cx = (p1.x + p2.x) / 2;
                const cy = (p1.y + p2.y) / 2 - Math.abs(p1.x - p2.x) * 0.15;
                
                // Quadratic bezier interpolation
                const t = p.progress;
                const x = Math.pow(1 - t, 2) * p1.x + 2 * (1 - t) * t * cx + Math.pow(t, 2) * p2.x;
                const y = Math.pow(1 - t, 2) * p1.y + 2 * (1 - t) * t * cy + Math.pow(t, 2) * p2.y;

                // Glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ef4444';
                ctx.beginPath();
                ctx.arc(x, y, 3 / Math.sqrt(transform.current.k), 0, Math.PI * 2);
                ctx.fillStyle = '#ef4444';
                ctx.fill();
                ctx.shadowBlur = 0; // reset
              });

              // Draw Nodes
              simData.current.nodes.forEach(node => {
                const pos = getPos(node.id);
                ctx.beginPath();
                const baseRadius = (node.hub ? 4 : 2) / Math.sqrt(transform.current.k);
                
                let color = '#94a3b8'; // Susceptible
                if (node.state === I) color = '#ef4444'; // Infected
                if (node.state === R) color = '#3b82f6'; // Recovered
                
                // Pulsing for infected
                let radius = baseRadius;
                if (node.state === I) {
                  const pulse = (Math.sin(Date.now() / 150) + 1) * (1.5 / Math.sqrt(transform.current.k));
                  radius = baseRadius + pulse;
                  ctx.shadowBlur = 15;
                  ctx.shadowColor = color;
                }

                if (hoveredNode === node.id || selectedNode === node.id) {
                  ctx.strokeStyle = '#ffffff';
                  ctx.lineWidth = 2 / transform.current.k;
                  radius += (1.5 / Math.sqrt(transform.current.k));
                }

                ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                
                if (hoveredNode === node.id || selectedNode === node.id) {
                  ctx.stroke();
                }
                ctx.shadowBlur = 0; // reset
              });

              // Simulation Logic Loop
              if (simulationState === 'playing') {
                simData.current.tickCounter++;
                
                // Update particles
                for (let i = simData.current.particles.length - 1; i >= 0; i--) {
                  const p = simData.current.particles[i];
                  p.progress += 0.02 * simSpeed;
                  if (p.progress >= 1) {
                    // Arrived! Infect target if susceptible
                    const targetNode = simData.current.nodes.find(n => n.id === p.targetId);
                    if (targetNode.state === S) {
                      targetNode.state = I;
                      targetNode.infectionDay = simData.current.day;
                    }
                    simData.current.particles.splice(i, 1);
                  }
                }

                // Process a "Day"
                const ticksPerDay = Math.max(1, 20 / simSpeed);
                if (simData.current.tickCounter >= ticksPerDay) {
                  simData.current.tickCounter = 0;
                  simData.current.day++;

                  const nodes = simData.current.nodes;
                  let currentS = 0, currentI = 0, currentR = 0;

                  nodes.forEach(node => {
                    if (node.state === S) currentS++;
                    else if (node.state === R) currentR++;
                    else if (node.state === I) {
                      currentI++;
                      // Check Recovery
                      if (simData.current.day - node.infectionDay >= recoveryDays) {
                        node.state = R;
                      } else {
                        // Transmission logic
                        const nodeEdges = simData.current.edges.filter(e => e.source === node.id || e.target === node.id);
                        nodeEdges.forEach(edge => {
                          const targetId = edge.source === node.id ? edge.target : edge.source;
                          const targetNode = nodes.find(n => n.id === targetId);
                          
                          if (targetNode.state === S) {
                            // Probability check based on transmission rate and edge weight
                            const roll = Math.random();
                            if (roll < (txRate * edge.weight)) {
                              // Launch particle
                              simData.current.particles.push({
                                sourceId: node.id,
                                targetId: targetId,
                                progress: 0
                              });
                            }
                          }
                        });
                      }
                    }
                  });

                  const newStats = { s: currentS, i: currentI, r: currentR, day: simData.current.day };
                  setStats(newStats);
                  simData.current.history.push(newStats);
                  drawChart();

                  // Auto-pause if finished
                  if (currentI === 0 && simData.current.day > 0 && simData.current.particles.length === 0) {
                    setSimulationState('paused');
                  }
                }
              }

              ctx.restore(); // Restore from zoom/pan transform

              animationFrameId = requestAnimationFrame(render);
            };

            render();
            return () => cancelAnimationFrame(animationFrameId);
          }, [simulationState, hoveredNode, selectedNode, txRate, recoveryDays, simSpeed, mapGeoJson]);

          // --- CHART RENDERING ---
          const drawChart = useCallback(() => {
            const canvas = chartRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            const history = simData.current.history;
            if (history.length === 0) return;

            const maxDay = Math.max(10, history[history.length - 1].day);
            const totalPop = CITIES.length;

            const drawLine = (key, color) => {
              ctx.beginPath();
              ctx.strokeStyle = color;
              ctx.lineWidth = 2;
              history.forEach((dataPoint, index) => {
                const x = (dataPoint.day / maxDay) * width;
                const y = height - ((dataPoint[key] / totalPop) * height);
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
              });
              ctx.stroke();
            };

            // Draw S, I, R lines
            drawLine('s', '#94a3b8'); // Gray
            drawLine('i', '#ef4444'); // Red
            drawLine('r', '#3b82f6'); // Blue

          }, []);

          // Make sure chart renders on initial load or resize
          useEffect(() => { drawChart(); }, [drawChart, stats]);

          // --- INTERACTION ---
          const handleCanvasMouseMove = (e) => {
            const rect = canvasRef.current.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (isDragging.current) {
              transform.current.x += mouseX - lastMouse.current.x;
              transform.current.y += mouseY - lastMouse.current.y;
              lastMouse.current = { x: mouseX, y: mouseY };
              return; 
            }
            
            lastMouse.current = { x: mouseX, y: mouseY };

            const x = (mouseX - transform.current.x) / transform.current.k;
            const y = (mouseY - transform.current.y) / transform.current.k;
            
            const width = canvasRef.current.clientWidth;
            const height = canvasRef.current.clientHeight;

            let closestNode = null;
            let minDist = 15 / transform.current.k; 

            simData.current.nodes.forEach(node => {
              const pos = project(node.lat, node.lon, width, height);
              const d = Math.sqrt(Math.pow(pos.x - x, 2) + Math.pow(pos.y - y, 2));
              if (d < minDist) {
                minDist = d;
                closestNode = node.id;
              }
            });

            setHoveredNode(closestNode);
          };

          const handleWheel = (e) => {
            e.preventDefault();
            const zoomIntensity = 0.1;
            const wheel = e.deltaY < 0 ? 1 : -1;
            const zoomFactor = Math.exp(wheel * zoomIntensity);
            
            const rect = canvasRef.current.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const newScale = Math.min(Math.max(transform.current.k * zoomFactor, 0.5), 20);
            const actualZoomFactor = newScale / transform.current.k;

            transform.current.x = mouseX - (mouseX - transform.current.x) * actualZoomFactor;
            transform.current.y = mouseY - (mouseY - transform.current.y) * actualZoomFactor;
            transform.current.k = newScale;
          };

          const handleMouseDown = (e) => {
            const rect = canvasRef.current.getBoundingClientRect();
            isDragging.current = true;
            lastMouse.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
          };

          const handleMouseUp = () => {
            isDragging.current = false;
          };

          const handleCanvasClick = () => {
            if (hoveredNode && simulationState === 'setup') {
              // Toggle Patient Zero
              const node = simData.current.nodes.find(n => n.id === hoveredNode);
              if (node.state === I) {
                node.state = S;
                node.infectionDay = -1;
                setSelectedNode(null);
              } else {
                // Reset others to S just in case we only want one P0
                simData.current.nodes.forEach(n => { n.state = S; n.infectionDay = -1; });
                node.state = I;
                node.infectionDay = 0;
                setSelectedNode(node.id);
              }
              
              const iCount = simData.current.nodes.filter(n => n.state === I).length;
              setStats({ s: CITIES.length - iCount, i: iCount, r: 0, day: 0 });
              simData.current.history = [{ s: CITIES.length - iCount, i: iCount, r: 0, day: 0 }];
              drawChart();
            }
          };

          const resetSimulation = () => {
            simData.current.nodes.forEach(n => {
              n.state = S;
              n.infectionDay = -1;
            });
            simData.current.particles = [];
            simData.current.day = 0;
            simData.current.tickCounter = 0;
            simData.current.history = [{ s: CITIES.length, i: 0, r: 0, day: 0 }];
            setSelectedNode(null);
            setStats({ s: CITIES.length, i: 0, r: 0, day: 0 });
            setSimulationState('setup');
            drawChart();
          };

          const togglePlay = () => {
            if (simulationState === 'setup' && selectedNode === null) {
              alert('Please select a Patient Zero city on the map first.');
              return;
            }
            setSimulationState(prev => prev === 'playing' ? 'paused' : 'playing');
          };

          return (
            <div className="flex h-screen bg-slate-950 text-slate-200 font-sans overflow-hidden">
              
              {/* LEFT SIDEBAR: Controls & Stats */}
              <div className="w-80 border-r border-slate-800 bg-slate-900/50 flex flex-col shadow-2xl z-10 backdrop-blur-sm">
                <div className="p-5 border-b border-slate-800">
                  <div className="flex items-center gap-2 mb-2 text-red-500">
                    <Activity className="w-6 h-6" />
                    <h1 className="text-xl font-bold tracking-tight text-white">Pandemico</h1>
                  </div>
                  <p className="text-xs text-slate-400">Network vs. Compartment Spread Model</p>
                </div>

                <div className="flex-1 overflow-y-auto p-5 space-y-6">
                  
                  {/* Main Controls */}
                  <div className="space-y-3">
                    <div className="flex gap-2">
                      <button 
                        onClick={togglePlay}
                        className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-medium transition-all ${
                          simulationState === 'playing' 
                          ? 'bg-amber-500/20 text-amber-400 hover:bg-amber-500/30' 
                          : 'bg-indigo-600 hover:bg-indigo-500 text-white'
                        }`}
                      >
                        {simulationState === 'playing' ? <Pause className="w-5 h-5" /> : <Play className="w-5 h-5" />}
                        {simulationState === 'playing' ? 'Pause' : (simulationState === 'setup' ? 'Start Outbreak' : 'Resume')}
                      </button>
                      <button 
                        onClick={resetSimulation}
                        className="px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg transition-colors text-slate-300"
                        title="Reset Simulation"
                      >
                        <RotateCcw className="w-5 h-5" />
                      </button>
                    </div>
                  </div>

                  {/* Educational Callout */}
                  <div className="bg-slate-800/60 p-4 rounded-xl border border-slate-700/50 text-sm shadow-inner">
                    <div className="flex items-start gap-2 mb-2 text-indigo-400 font-semibold">
                      <Info className="w-4 h-4 mt-0.5 shrink-0" />
                      <span>Why Network Models?</span>
                    </div>
                    <p className="text-slate-400 leading-relaxed">
                      Standard SIR models assume everyone mixes equally. By using a <strong>Network Model</strong>, we visualize how physical flight routes act as vectors. Notice how "hub" cities accelerate global spread while isolated regions remain safe longer.
                    </p>
                  </div>

                  {/* Stats Panel */}
                  <div className="space-y-4">
                    <h3 className="text-sm font-semibold text-slate-300 uppercase tracking-wider">Live Metrics - Day {stats.day}</h3>
                    
                    <div className="grid grid-cols-3 gap-2 text-center">
                      <div className="bg-slate-800/40 p-2 rounded-lg border border-slate-700/30">
                        <div className="text-xs text-slate-500 mb-1">Susceptible</div>
                        <div className="text-lg font-bold text-slate-300">{stats.s}</div>
                      </div>
                      <div className="bg-red-950/30 p-2 rounded-lg border border-red-900/30">
                        <div className="text-xs text-red-400/80 mb-1">Infected</div>
                        <div className="text-lg font-bold text-red-400">{stats.i}</div>
                      </div>
                      <div className="bg-blue-950/30 p-2 rounded-lg border border-blue-900/30">
                        <div className="text-xs text-blue-400/80 mb-1">Recovered</div>
                        <div className="text-lg font-bold text-blue-400">{stats.r}</div>
                      </div>
                    </div>

                    {/* Dynamic Line Chart */}
                    <div className="mt-4">
                      <div className="text-xs text-slate-500 mb-2 flex justify-between">
                        <span>Population Curve</span>
                        <span className="flex gap-2">
                          <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-slate-400"></span>S</span>
                          <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-500"></span>I</span>
                          <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-blue-500"></span>R</span>
                        </span>
                      </div>
                      <div className="h-32 w-full bg-slate-900/50 rounded-lg border border-slate-800 p-2 relative">
                        <canvas ref={chartRef} width="260" height="110" className="w-full h-full"></canvas>
                      </div>
                    </div>
                  </div>

                  {/* Simulation Parameters */}
                  <div className="space-y-4 pt-4 border-t border-slate-800">
                    <h3 className="text-sm font-semibold text-slate-300 uppercase tracking-wider">Parameters</h3>
                    
                    <div>
                      <div className="flex justify-between text-xs mb-1">
                        <span className="text-slate-400">Transmission Rate</span>
                        <span className="text-slate-300 font-mono">{(txRate * 100).toFixed(0)}% / link</span>
                      </div>
                      <input 
                        type="range" min="0.01" max="0.5" step="0.01" value={txRate}
                        onChange={(e) => setTxRate(parseFloat(e.target.value))}
                        className="w-full accent-indigo-500"
                        disabled={simulationState !== 'setup'}
                      />
                    </div>
                    
                    <div>
                      <div className="flex justify-between text-xs mb-1">
                        <span className="text-slate-400">Recovery Time</span>
                        <span className="text-slate-300 font-mono">{recoveryDays} days</span>
                      </div>
                      <input 
                        type="range" min="5" max="30" step="1" value={recoveryDays}
                        onChange={(e) => setRecoveryDays(parseInt(e.target.value))}
                        className="w-full accent-indigo-500"
                        disabled={simulationState !== 'setup'}
                      />
                    </div>

                    <div>
                      <div className="flex justify-between text-xs mb-1">
                        <span className="text-slate-400">Simulation Speed</span>
                        <span className="text-slate-300 font-mono">{simSpeed}x</span>
                      </div>
                      <input 
                        type="range" min="0.1" max="5" step="0.1" value={simSpeed}
                        onChange={(e) => setSimSpeed(parseFloat(e.target.value))}
                        className="w-full accent-slate-500"
                      />
                    </div>
                  </div>
                </div>
              </div>

              {/* RIGHT AREA: Visualization Canvas */}
              <div className="flex-1 relative bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black overflow-hidden">
                
                {/* Map UI Controls Overlay */}
                <div className="absolute top-4 right-4 z-20 flex flex-col gap-2 bg-slate-900/80 p-2 rounded-xl border border-slate-700/50 shadow-lg backdrop-blur">
                  <div className="p-2 text-slate-400 hover:text-white cursor-pointer" onClick={() => { transform.current = {x:0, y:0, k:1} }} title="Reset View">
                     <Move className="w-5 h-5" />
                  </div>
                </div>

                {/* Helper overlay when in setup */}
                {simulationState === 'setup' && selectedNode === null && (
                  <div className="absolute top-10 left-1/2 -translate-x-1/2 bg-slate-800/80 backdrop-blur-md px-6 py-3 rounded-full border border-slate-700 text-slate-200 flex items-center gap-3 animate-pulse shadow-lg pointer-events-none z-20">
                    <Crosshair className="w-5 h-5 text-indigo-400" />
                    <span>Select a <strong>Patient Zero</strong> city on the map</span>
                  </div>
                )}

                <canvas 
                  ref={canvasRef} 
                  className={`w-full h-full block touch-none ${isDragging.current ? 'cursor-grabbing' : (simulationState === 'setup' && !hoveredNode ? 'cursor-crosshair' : (hoveredNode ? 'cursor-pointer' : 'cursor-grab'))} active:cursor-grabbing`}
                  onMouseMove={handleCanvasMouseMove}
                  onClick={handleCanvasClick}
                  onWheel={handleWheel}
                  onMouseDown={handleMouseDown}
                  onMouseUp={handleMouseUp}
                  onMouseLeave={handleMouseUp}
                />

                {/* Floating Tooltip for hovered node */}
                {hoveredNode && (
                  <div className="absolute bottom-6 right-6 bg-slate-900/90 backdrop-blur border border-slate-700 p-4 rounded-xl shadow-2xl max-w-xs pointer-events-none transition-opacity">
                    {(() => {
                      const node = simData.current.nodes.find(n => n.id === hoveredNode);
                      return (
                        <>
                          <div className="flex items-center justify-between mb-2">
                            <h3 className="font-bold text-lg text-white flex items-center gap-2">
                              {node.name}
                              {node.hub && <Globe className="w-4 h-4 text-indigo-400" />}
                            </h3>
                          </div>
                          <div className="space-y-1 text-sm text-slate-300">
                            <p className="flex justify-between"><span>Population:</span> <span>{node.pop}M</span></p>
                            <p className="flex justify-between"><span>Status:</span> 
                              <span className={`font-semibold ${
                                node.state === I ? 'text-red-400' : 
                                node.state === R ? 'text-blue-400' : 'text-slate-400'
                              }`}>
                                {node.state === I ? 'Infected' : node.state === R ? 'Recovered' : 'Susceptible'}
                              </span>
                            </p>
                            {node.state === I && node.infectionDay >= 0 && (
                              <p className="flex justify-between"><span>Infected on:</span> <span>Day {node.infectionDay}</span></p>
                            )}
                          </div>
                          {simulationState === 'setup' && selectedNode !== node.id && (
                            <div className="mt-3 pt-3 border-t border-slate-700 text-xs text-indigo-400 flex items-center gap-1">
                              <ShieldAlert className="w-3 h-3" /> Click to set as Patient Zero
                            </div>
                          )}
                        </>
                      );
                    })()}
                  </div>
                )}
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
