<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="experiment-description" content="Neon space themed step sequencer for generating rhythmic procedural melodies.">
    <title>Wonky Space-Step 3057</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f3ff;
            --deep-space: #020202;
        }

        body {
            background-color: var(--deep-space);
            color: var(--neon-blue);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            margin: 0;
            user-select: none;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }
        
        .glitch-border {
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue), inset 0 0 5px var(--neon-blue);
        }

        .step-btn {
            transition: all 0.1s ease;
        }

        .step-active {
            background-color: var(--neon-pink) !important;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .step-current {
            border: 2px solid white;
            transform: scale(1.1);
        }

        canvas {
            filter: contrast(1.4) brightness(1.1) saturate(1.3);
        }

        .scanner-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: rgba(0, 243, 255, 0.15);
            pointer-events: none;
            animation: scan 8s linear infinite;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        @keyframes scan {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            min-width: 60px;
        }
        
        input[type=range] {
            writing-mode: bt-lr; 
            appearance: slider-vertical;
            width: 14px;
            height: 110px;
            background: #111;
            cursor: crosshair;
        }

        .voice-btn.active {
            background-color: rgba(255, 0, 127, 0.4);
            box-shadow: 0 0 15px var(--neon-pink);
            border-color: var(--neon-pink);
        }
        
        .panel-bg {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-between p-4">
    <div class="scanner-line"></div>

    <!-- Header -->
    <header class="w-full flex justify-between items-center z-10 px-6 pt-2">
        <div>
            <h1 class="cyber-font text-3xl font-bold italic tracking-tighter text-pink-500">SPACE-STEP <span class="text-cyan-400">3057</span></h1>
            <p class="text-[10px] opacity-70">SIGNAL_INTEGRITY: DEGRADED // MODULES: ROBOTIC_FM | FRACTURE_GLITCH</p>
        </div>
        <div class="flex gap-4">
            <button id="startBtn" class="glitch-border px-6 py-2 hover:bg-cyan-900 transition-colors cyber-font font-bold">WAKE SYSTEM</button>
            <div id="bpmDisplay" class="glitch-border px-4 py-2 text-xl font-bold">80 BPM</div>
        </div>
    </header>

    <!-- Visualizer Core -->
    <div class="relative flex-grow w-full max-w-6xl my-4 overflow-hidden rounded-lg bg-black/60 border border-cyan-900/50 shadow-2xl">
        <canvas id="visuals" class="w-full h-full"></canvas>
        <div id="overlayText" class="absolute top-4 left-4 text-[10px] text-cyan-500 pointer-events-none opacity-40 leading-tight">
            [FRACTURE_ERROR_LOG]<br>
            BUFFER_STUTTER: DETECTED<br>
            ROBOTIC_MOD: ACTIVE<br>
            GRAVITY_DRIVE: SLUDGE
        </div>
    </div>

    <!-- Sequencer / Control Panel -->
    <div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-4 gap-4 z-10 pb-4">
        <!-- Steps -->
        <div class="md:col-span-2 panel-bg p-5 border border-pink-500/30 rounded-xl">
            <div class="flex justify-between items-center mb-3">
                <span class="text-pink-500 text-xs font-bold uppercase tracking-widest">Drum Grid</span>
                <div class="flex gap-3">
                    <button id="clearSeq" class="text-[10px] border border-pink-900 px-3 py-1 hover:bg-pink-900/30 transition-all">PURGE</button>
                    <button id="randomSeq" class="text-[10px] border border-pink-900 px-3 py-1 hover:bg-pink-900/30 transition-all">CHAOS</button>
                </div>
            </div>
            
            <div id="sequencerGrid" class="grid grid-cols-16 gap-1.5 h-20">
                <!-- Steps generated by JS -->
            </div>
            
            <div class="mt-4 grid grid-cols-2 gap-3">
                <button class="voice-btn bg-cyan-900/10 border border-cyan-500/30 text-[10px] py-1 transition-all active" data-voice="kick">KICK</button>
                <button class="voice-btn bg-cyan-900/10 border border-cyan-500/30 text-[10px] py-1 transition-all" data-voice="snare">SNARE</button>
                <button class="voice-btn bg-cyan-900/10 border border-cyan-500/30 text-[10px] py-1 transition-all" data-voice="hat">GHOST_HAT</button>
                <button class="voice-btn bg-cyan-900/10 border border-cyan-500/30 text-[10px] py-1 transition-all" data-voice="bass">SUB_WONK</button>
            </div>
        </div>

        <!-- Glitch Controls -->
        <div class="md:col-span-2 panel-bg p-5 border border-cyan-500/30 rounded-xl flex justify-between items-center">
            <div class="knob-container">
                <input type="range" id="robotControl" min="0" max="100" value="40">
                <span class="text-[9px] cyber-font mt-1">ROBOTIC</span>
            </div>
            <div class="knob-container">
                <input type="range" id="glitchControl" min="0" max="100" value="30">
                <span class="text-[9px] cyber-font mt-1">GLITCH</span>
            </div>
            <div class="knob-container">
                <input type="range" id="wonkControl" min="0" max="100" value="70">
                <span class="text-[9px] cyber-font mt-1">WONK</span>
            </div>
            <div class="knob-container">
                <input type="range" id="echoControl" min="0" max="100" value="60">
                <span class="text-[9px] cyber-font mt-1">GHOST</span>
            </div>
            <div class="knob-container">
                <input type="range" id="driveControl" min="0" max="100" value="80">
                <span class="text-[9px] cyber-font mt-1">DRIVE</span>
            </div>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let isStarted = false;
        let currentStep = 0;
        let bpm = 80; 
        
        const sequence = {
            kick: new Array(16).fill(false),
            snare: new Array(16).fill(false),
            hat: new Array(16).fill(false),
            bass: new Array(16).fill(false)
        };

        // Deep Space Pattern
        sequence.kick[0] = true; sequence.kick[8] = true; sequence.kick[11] = true;
        sequence.snare[4] = true; sequence.snare[12] = true;
        sequence.hat = sequence.hat.map((_, i) => i % 2 === 0);
        sequence.bass[0] = true; sequence.bass[6] = true; sequence.bass[10] = true; sequence.bass[14] = true;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new AudioCtx();
            playLoop();
        }

        function triggerDrumVisual(type) {
            impacts.push(new Impact(type));
        }

        // Apply Robotic/Glitch processing to an oscillator
        function applyRoboticFX(osc, gain, time, intensity) {
            if (intensity <= 0) return;
            const modulator = audioCtx.createOscillator();
            const modGain = audioCtx.createGain();
            
            modulator.frequency.value = 50 + intensity * 5;
            modGain.gain.value = intensity * 10;
            
            modulator.connect(modGain);
            modGain.connect(osc.frequency);
            modulator.start(time);
            modulator.stop(time + 0.5);
        }

        function createKick(time) {
            const robotVal = document.getElementById('robotControl').value;
            triggerDrumVisual('kick');
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(120, time);
            osc.frequency.exponentialRampToValueAtTime(30, time + 0.5);
            
            applyRoboticFX(osc, gain, time, robotVal);
            
            gain.gain.setValueAtTime(0.8, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
            osc.start(time);
            osc.stop(time + 0.5);
        }

        function createSnare(time) {
            const robotVal = document.getElementById('robotControl').value;
            triggerDrumVisual('snare');
            
            const noise = audioCtx.createBufferSource();
            const bufferSize = audioCtx.sampleRate * 0.15;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                // Incorporate robotic metallic noise
                const metallic = Math.sin(i * (robotVal / 100));
                data[i] = (Math.random() * 2 - 1) * 0.7 + (metallic * 0.3);
            }
            
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(robotVal * 10 + 500, time);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.5, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.25);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start(time);
            noise.stop(time + 0.3);
        }

        function createHat(time) {
            triggerDrumVisual('hat');
            const ghostVal = document.getElementById('echoControl').value / 100;
            const robotVal = document.getElementById('robotControl').value / 100;
            
            const playHat = (t, vol) => {
                const osc = audioCtx.createOscillator();
                osc.type = Math.random() > 0.5 ? 'square' : 'triangle';
                const gain = audioCtx.createGain();
                
                osc.frequency.setValueAtTime(8000 + (robotVal * 4000), t);
                gain.gain.setValueAtTime(vol, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(t);
                osc.stop(t + 0.05);
            };

            playHat(time, 0.12);
            if (ghostVal > 0.2) playHat(time + 0.1, 0.06 * ghostVal);
        }

        function createBass(time) {
            triggerDrumVisual('bass');
            const wonk = document.getElementById('wonkControl').value / 100;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const lowpass = audioCtx.createBiquadFilter();

            osc.type = 'sawtooth';
            const baseFreq = 35 + (Math.sin(time * 3) * 12 * wonk);
            osc.frequency.setValueAtTime(baseFreq, time);
            
            lowpass.type = 'lowpass';
            lowpass.frequency.setValueAtTime(300, time);
            lowpass.Q.value = 10 * wonk;

            gain.gain.setValueAtTime(0.4, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 1.2);

            osc.connect(lowpass);
            lowpass.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(time);
            osc.stop(time + 1.2);
            triggerVisualWonk(wonk);
        }

        function playLoop() {
            const glitchVal = document.getElementById('glitchControl').value / 100;
            const wonkVal = document.getElementById('wonkControl').value / 100;
            const stepTime = (60 / bpm) / 4;
            
            const jitter = (Math.random() - 0.5) * 0.05 * wonkVal;
            const nextTick = audioCtx.currentTime + 0.05 + jitter;

            // Trigger instruments with potential glitch stutters
            const triggerWithGlitch = (fn) => {
                fn(nextTick);
                // Stochastic re-trigger (The Glitch)
                if (Math.random() < glitchVal * 0.4) {
                    const stutterTime = nextTick + (Math.random() * 0.1);
                    setTimeout(() => fn(stutterTime), 50);
                    if (glitchVal > 0.7) triggerVisualWonk(glitchVal);
                }
            };

            if (sequence.kick[currentStep]) triggerWithGlitch(createKick);
            if (sequence.snare[currentStep]) triggerWithGlitch(createSnare);
            if (sequence.hat[currentStep]) triggerWithGlitch(createHat);
            if (sequence.bass[currentStep]) triggerWithGlitch(createBass);
            
            updateUI();
            currentStep = (currentStep + 1) % 16;
            setTimeout(playLoop, stepTime * 1000);
        }

        // --- VISUAL ENGINE ---
        const canvas = document.getElementById('visuals');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let impacts = [];
        let wonkIntensity = 0;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1.2;
                this.speedY = (Math.random() - 0.5) * 1.2;
                this.color = Math.random() > 0.5 ? '#00f3ff' : '#ff007f';
                this.life = 1;
            }
            update() {
                const currentWonk = document.getElementById('wonkControl').value / 40;
                this.x += this.speedX * (1 + wonkIntensity * 15) * currentWonk;
                this.y += this.speedY * (1 + wonkIntensity * 15) * currentWonk;
                this.life -= 0.007;
                if (this.life <= 0 || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life * 0.5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Impact {
            constructor(type) {
                this.type = type;
                this.x = canvas.width / 2 + (Math.random() - 0.5) * (canvas.width * 0.7);
                this.y = canvas.height / 2 + (Math.random() - 0.5) * (canvas.height * 0.7);
                this.radius = 0;
                this.maxRadius = type === 'kick' ? 250 : (type === 'snare' ? 160 : (type === 'bass' ? 350 : 60));
                this.life = 1;
                this.color = type === 'kick' ? '#ff007f' : (type === 'snare' ? '#00f3ff' : (type === 'bass' ? 'rgba(255, 0, 127, 0.15)' : '#ffffff'));
            }
            update() {
                this.radius += (this.maxRadius - this.radius) * 0.06;
                this.life -= 0.04;
            }
            draw() {
                const glitchVal = document.getElementById('glitchControl').value / 100;
                ctx.globalAlpha = this.life;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                
                // Add visual glitching to shapes
                const offset = (Math.random() - 0.5) * 20 * glitchVal;
                
                ctx.beginPath();
                if (this.type === 'snare') {
                    ctx.rect(this.x - this.radius + offset, this.y - this.radius, this.radius * 2, this.radius * 2);
                } else if (this.type === 'bass') {
                    ctx.arc(this.x + offset, this.y, this.radius, 0, Math.PI * 2);
                } else {
                    ctx.arc(this.x, this.y + offset, this.radius, 0, Math.PI * 2);
                }
                ctx.stroke();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            const glitchVal = document.getElementById('glitchControl').value / 100;
            ctx.fillStyle = `rgba(2, 2, 2, ${0.12 + (wonkIntensity * 0.2)})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => { p.update(); p.draw(); });
            impacts = impacts.filter(imp => imp.life > 0);
            impacts.forEach(imp => { imp.update(); imp.draw(); });

            // Glitch bars
            if (Math.random() > 1.0 - (glitchVal * 0.1)) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(0, Math.random() * canvas.height, canvas.width, 2);
            }

            wonkIntensity *= 0.93;
            requestAnimationFrame(animate);
        }
        animate();

        function triggerVisualWonk(val) {
            wonkIntensity = val;
        }

        // --- UI ---
        const grid = document.getElementById('sequencerGrid');
        let activeVoice = 'kick';

        function buildGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const btn = document.createElement('button');
                btn.className = `step-btn bg-zinc-900 border border-zinc-800 rounded w-full h-full hover:bg-zinc-800`;
                btn.onclick = () => {
                    sequence[activeVoice][i] = !sequence[activeVoice][i];
                    updateUI();
                };
                grid.appendChild(btn);
            }
        }

        function updateUI() {
            const steps = grid.querySelectorAll('.step-btn');
            steps.forEach((s, i) => {
                s.classList.remove('step-active', 'step-current');
                if (sequence[activeVoice][i]) s.classList.add('step-active');
                if (i === (currentStep === 0 ? 15 : currentStep - 1)) s.classList.add('step-current');
            });
            document.querySelectorAll('.voice-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.voice === activeVoice);
            });
        }

        document.querySelectorAll('.voice-btn').forEach(btn => {
            btn.onclick = () => {
                activeVoice = btn.dataset.voice;
                updateUI();
            };
        });

        document.getElementById('startBtn').onclick = function() {
            if (!isStarted) {
                initAudio();
                this.innerText = "HALT CORE";
                this.classList.add('bg-pink-900');
                isStarted = true;
            } else { window.location.reload(); }
        };

        document.getElementById('randomSeq').onclick = () => {
            sequence[activeVoice] = sequence[activeVoice].map(() => Math.random() > 0.85);
            updateUI();
        };

        document.getElementById('clearSeq').onclick = () => {
            sequence[activeVoice].fill(false);
            updateUI();
        };

        buildGrid();
        updateUI();
    </script>
</body>
</html>
