<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="experiment-description" content="Interactive spectral graph visualization for exploring structure and connectivity patterns.">
    <title>Spectral Graph Explorer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- SVG ICON COMPONENTS (Replacing Lucide Imports) ---
        const Activity = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>);
        const MoveIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="5 9 2 12 5 15"></polyline><polyline points="9 5 12 2 15 5"></polyline><polyline points="19 9 22 12 19 15"></polyline><polyline points="9 19 12 22 15 19"></polyline><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>);
        const Plus = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
        const LinkIcon = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>);
        const Trash2 = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>);
        const Info = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>);

        // --- MATH ENGINE ---
        const createMatrix = (rows, cols, val = 0) => Array(rows).fill(null).map(() => Array(cols).fill(val));

        const getEigenData = (matrix, maxIter = 100) => {
          const n = matrix.length;
          let A = matrix.map(row => [...row]); 
          let V = createMatrix(n, n, 0); 
          for (let i = 0; i < n; i++) V[i][i] = 1;

          for (let iter = 0; iter < maxIter; iter++) {
            let maxVal = 0;
            let p = -1, q = -1;

            for (let i = 0; i < n; i++) {
              for (let j = i + 1; j < n; j++) {
                if (Math.abs(A[i][j]) > maxVal) {
                  maxVal = Math.abs(A[i][j]);
                  p = i;
                  q = j;
                }
              }
            }

            if (maxVal < 1e-9) break;

            const app = A[p][p];
            const aqq = A[q][q];
            const apq = A[p][q];

            const phi = 0.5 * Math.atan2(2 * apq, aqq - app);
            const c = Math.cos(phi);
            const s = Math.sin(phi);

            const app_new = c * c * app - 2 * s * c * apq + s * s * aqq;
            const aqq_new = s * s * app + 2 * s * c * apq + c * c * aqq;
            A[p][p] = app_new;
            A[q][q] = aqq_new;
            A[p][q] = 0;
            A[q][p] = 0;

            for (let i = 0; i < n; i++) {
              if (i !== p && i !== q) {
                const aip = A[i][p];
                const aiq = A[i][q];
                A[i][p] = c * aip - s * aiq;
                A[p][i] = A[i][p];
                A[i][q] = s * aip + c * aiq;
                A[q][i] = A[i][q];
              }
            }

            for (let i = 0; i < n; i++) {
              const vip = V[i][p];
              const viq = V[i][q];
              V[i][p] = c * vip - s * viq;
              V[i][q] = s * vip + c * viq;
            }
          }

          const eigenvalues = [];
          for (let i = 0; i < n; i++) {
            eigenvalues.push({
              value: A[i][i],
              vector: V.map(row => row[i])
            });
          }

          eigenvalues.sort((a, b) => b.value - a.value);
          return eigenvalues;
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
          const [nodes, setNodes] = useState([
            { id: 0, x: 200, y: 150 },
            { id: 1, x: 300, y: 150 },
            { id: 2, x: 250, y: 240 },
            { id: 3, x: 150, y: 240 }
          ]);
          const [links, setLinks] = useState([
            { source: 0, target: 1 },
            { source: 1, target: 2 },
            { source: 2, target: 3 },
            { source: 3, target: 0 },
            { source: 0, target: 2 }
          ]);

          const [dragging, setDragging] = useState(null); 
          const [mode, setMode] = useState('move'); 
          
          const [matrixType, setMatrixType] = useState('adjacency');
          const svgRef = useRef(null);

          const { matrix, eigenvalues, centrality } = useMemo(() => {
            const n = nodes.length;
            if (n === 0) return { matrix: [], eigenvalues: [], centrality: [] };

            const adj = createMatrix(n, n, 0);
            const degrees = Array(n).fill(0);

            links.forEach(l => {
              if (l.source < n && l.target < n) {
                adj[l.source][l.target] = 1;
                adj[l.target][l.source] = 1;
                degrees[l.source]++;
                degrees[l.target]++;
              }
            });

            let targetMatrix;

            if (matrixType === 'adjacency') {
              targetMatrix = adj;
            } else {
              targetMatrix = createMatrix(n, n, 0);
              for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                  if (i === j) {
                    targetMatrix[i][j] = degrees[i];
                  } else {
                    targetMatrix[i][j] = -adj[i][j];
                  }
                }
              }
            }

            const rawEigen = getEigenData(targetMatrix);
            const principalEigenvector = rawEigen[0].vector;
            
            const maxVal = Math.max(...principalEigenvector.map(Math.abs));
            const normalizedCentrality = principalEigenvector.map(v => Math.abs(v) / (maxVal || 1));

            return { 
              matrix: targetMatrix, 
              eigenvalues: rawEigen.map(e => e.value),
              centrality: normalizedCentrality 
            };
          }, [nodes, links, matrixType]);

          const handleMouseDownNode = (e, id) => {
            e.stopPropagation();
            if (!svgRef.current) return;
            
            const rect = svgRef.current.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (mode === 'link') {
              setDragging({ type: 'link', id, startX: nodes[id].x, startY: nodes[id].y, currX: x, currY: y });
            } else if (mode === 'move') {
              setDragging({ type: 'move', id });
            } else if (mode === 'delete') {
              deleteNode(id);
            }
          };

          const handleMouseUpNode = (e, targetId) => {
            e.stopPropagation();
            if (dragging && dragging.type === 'link' && dragging.id !== targetId) {
              const sourceId = dragging.id;
              const exists = links.some(l => 
                (l.source === sourceId && l.target === targetId) || 
                (l.source === targetId && l.target === sourceId)
              );
              if (!exists) {
                setLinks([...links, { source: sourceId, target: targetId }]);
              }
            }
            setDragging(null);
          };

          const handleCanvasClick = (e) => {
            if (mode === 'add' && svgRef.current) {
              const rect = svgRef.current.getBoundingClientRect();
              const x = e.clientX - rect.left;
              const y = e.clientY - rect.top;
              if (nodes.length < 12) {
                setNodes([...nodes, { id: nodes.length, x, y }]);
              }
            }
          };

          const handleMouseMove = (e) => {
            if (!dragging || !svgRef.current) return;
            
            const rect = svgRef.current.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (dragging.type === 'move') {
              setNodes(nodes.map(n => n.id === dragging.id ? { ...n, x, y } : n));
            } else if (dragging.type === 'link') {
              setDragging({ ...dragging, currX: x, currY: y });
            }
          };

          const handleGlobalMouseUp = () => {
            setDragging(null);
          };

          const deleteNode = (id) => {
            const remainingNodes = nodes.filter(n => n.id !== id);
            const remappedNodes = remainingNodes.map((n, i) => ({ ...n, oldId: n.id, id: i }));
            
            const remappedLinks = links.reduce((acc, l) => {
              const sNode = remappedNodes.find(n => n.oldId === l.source);
              const tNode = remappedNodes.find(n => n.oldId === l.target);
              if (sNode && tNode) {
                acc.push({ source: sNode.id, target: tNode.id });
              }
              return acc;
            }, []);

            setNodes(remappedNodes.map(({oldId, ...rest}) => rest));
            setLinks(remappedLinks);
            setDragging(null);
          };

          const loadPreset = (type) => {
            setLinks([]);
            if (type === 'star') {
              setNodes([
                { id: 0, x: 250, y: 200 }, { id: 1, x: 250, y: 100 },
                { id: 2, x: 350, y: 200 }, { id: 3, x: 250, y: 300 },
                { id: 4, x: 150, y: 200 }, { id: 5, x: 320, y: 130 },
              ]);
              setLinks([
                { source: 0, target: 1 }, { source: 0, target: 2 },
                { source: 0, target: 3 }, { source: 0, target: 4 },
                { source: 0, target: 5 }
              ]);
            } else if (type === 'circle') {
              const count = 6, r = 80, cx = 250, cy = 200;
              const newNodes = [], newLinks = [];
              for(let i=0; i<count; i++) {
                const angle = (i / count) * Math.PI * 2;
                newNodes.push({ id: i, x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
                newLinks.push({ source: i, target: (i+1)%count });
              }
              setNodes(newNodes);
              setLinks(newLinks);
            } else if (type === 'disconnected') {
              setNodes([
                { id: 0, x: 150, y: 150 }, { id: 1, x: 150, y: 250 },
                { id: 2, x: 350, y: 150 }, { id: 3, x: 350, y: 250 }
              ]);
              setLinks([{source:0, target:1}, {source:2, target:3}]);
            }
          };

          const getAlgebraicConnectivity = () => {
            if (matrixType !== 'laplacian') return null;
            const sorted = [...eigenvalues].sort((a,b) => a-b);
            return sorted[1] !== undefined ? sorted[1].toFixed(3) : '0';
          };

          const getButtonClass = (isActive, colorClass = "bg-cyan-600") => `
            px-3 py-1.5 rounded text-sm font-bold uppercase tracking-wider flex items-center gap-2 transition-all duration-200
            ${isActive 
              ? `${colorClass} text-white shadow-[0_0_10px_currentColor]` 
              : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white'}
          `;

          return (
            <div className="min-h-screen bg-slate-950 text-cyan-50 p-6 font-mono selection:bg-pink-500 selection:text-white">
              
              <header className="max-w-6xl mx-auto mb-8 border-b border-slate-800 pb-4">
                <h1 className="text-4xl font-black italic flex items-center gap-3 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">
                  <Activity className="w-8 h-8 text-pink-500" />
                  SPECTRAL_GRAPH.EXE
                </h1>
                <p className="text-slate-400 mt-2 max-w-2xl text-sm">
                  {'>'} INITIALIZING VISUALIZER...<br/>
                  {'>'} ANALYZING NETWORK EIGENVALUES [ADJACENCY/LAPLACIAN]
                </p>
              </header>

              <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                {/* LEFT COLUMN: VISUALIZER & MATRIX */}
                <div className="flex flex-col gap-4">
                  
                  {/* Visualizer Container */}
                  <div className="bg-slate-900 rounded-xl shadow-[0_0_20px_rgba(0,0,0,0.5)] border border-slate-700 overflow-hidden relative">
                    
                    {/* Toolbar */}
                    <div className="bg-slate-800/80 p-3 border-b border-slate-700 flex flex-wrap gap-2 items-center justify-between backdrop-blur-sm">
                      <div className="flex gap-2">
                        <button onClick={() => setMode('move')} className={getButtonClass(mode === 'move', 'bg-cyan-600')}>
                          <MoveIcon className="w-4 h-4" /> Move
                        </button>
                        <button onClick={() => setMode('add')} className={getButtonClass(mode === 'add', 'bg-green-600')}>
                          <Plus className="w-4 h-4" /> Add
                        </button>
                        <button onClick={() => setMode('link')} className={getButtonClass(mode === 'link', 'bg-pink-600')}>
                          <LinkIcon className="w-4 h-4" /> Link
                        </button>
                         <button onClick={() => setMode('delete')} className={getButtonClass(mode === 'delete', 'bg-red-600')}>
                          <Trash2 className="w-4 h-4" /> Del
                        </button>
                      </div>
                      <div className="flex gap-2">
                        {['star', 'circle', 'disconnected'].map(preset => (
                          <button key={preset} onClick={() => loadPreset(preset)} className="text-xs uppercase font-bold text-slate-500 hover:text-cyan-400 px-2 py-1 border border-slate-700 rounded hover:border-cyan-500 transition-colors">
                            {preset}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Canvas */}
                    <div className="relative h-96 bg-slate-900 cursor-crosshair overflow-hidden group">
                       {/* Grid Background */}
                       <div className="absolute inset-0 opacity-20 pointer-events-none" style={{ 
                         backgroundImage: 'linear-gradient(#334155 1px, transparent 1px), linear-gradient(90deg, #334155 1px, transparent 1px)',
                         backgroundSize: '20px 20px'
                       }}></div>

                       <svg 
                        ref={svgRef}
                        className="w-full h-full relative z-10"
                        onClick={handleCanvasClick}
                        onMouseMove={handleMouseMove}
                        onMouseUp={handleGlobalMouseUp}
                        onMouseLeave={handleGlobalMouseUp}
                       >
                         <defs>
                           <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                             <feGaussianBlur stdDeviation="2" result="blur" />
                             <feComposite in="SourceGraphic" in2="blur" operator="over" />
                           </filter>
                         </defs>
                         
                         {/* Edges */}
                         {links.map((link, i) => {
                            const s = nodes[link.source];
                            const t = nodes[link.target];
                            if(!s || !t) return null;
                            return (
                              <line 
                                key={i} 
                                x1={s.x} y1={s.y} 
                                x2={t.x} y2={t.y} 
                                stroke="#06b6d4" 
                                strokeWidth="2"
                                strokeOpacity="0.6"
                              />
                            );
                         })}

                         {/* Active Drag Line */}
                         {dragging && dragging.type === 'link' && (
                           <line 
                            x1={dragging.startX} y1={dragging.startY}
                            x2={dragging.currX} y2={dragging.currY}
                            stroke="#f472b6" 
                            strokeWidth="2"
                            strokeDasharray="5,5"
                            className="animate-pulse"
                           />
                         )}

                         {/* Nodes */}
                         {nodes.map((node, i) => {
                           const size = matrixType === 'adjacency' ? 15 + (centrality[i] || 0) * 20 : 20;
                           const isSource = dragging && dragging.type === 'link' && dragging.id === i;

                           return (
                             <g 
                              key={node.id} 
                              transform={`translate(${node.x},${node.y})`}
                              onMouseDown={(e) => handleMouseDownNode(e, node.id)}
                              onMouseUp={(e) => handleMouseUpNode(e, node.id)}
                              className={`transition-all duration-75 ${mode === 'move' ? 'cursor-move' : 'cursor-pointer'}`}
                              style={{ opacity: mode === 'delete' ? 0.7 : 1 }}
                             >
                               <circle 
                                r={size} 
                                fill={isSource ? '#f472b6' : '#22d3ee'} 
                                stroke="#0f172a" 
                                strokeWidth="2"
                                filter="url(#glow)"
                                className="shadow-sm hover:fill-pink-500 transition-colors"
                               />
                               <circle 
                                r={size + 4} 
                                fill="transparent"
                                stroke={isSource ? '#f472b6' : 'transparent'}
                                strokeWidth="1"
                                opacity="0.5"
                               />
                               <text 
                                dy=".3em" 
                                textAnchor="middle" 
                                fill="#0f172a" 
                                fontSize="12" 
                                fontWeight="bold"
                                pointerEvents="none"
                               >
                                 {node.id}
                               </text>
                             </g>
                           )
                         })}
                       </svg>
                       
                       {/* Mode status indicator */}
                       <div className="absolute bottom-4 left-4 right-4 flex justify-between pointer-events-none">
                         <div className="bg-slate-900/90 text-cyan-400 text-xs px-2 py-1 border border-cyan-900/50 rounded shadow-[0_0_10px_rgba(0,0,0,0.5)]">
                            {mode === 'add' && "[ADD MODE] Click empty space"}
                            {mode === 'link' && "[LINK MODE] Drag from Node A -> Node B"}
                            {mode === 'move' && "[MOVE MODE] Drag nodes"}
                            {mode === 'delete' && "[DELETE MODE] Click node to purge"}
                         </div>
                       </div>
                    </div> 
                  </div> 

                  {/* Matrix View Container */}
                  <div className="bg-slate-900 rounded-xl border border-slate-700 p-4 shadow-lg font-mono text-sm">
                     <div className="flex justify-between items-center mb-4">
                       <h2 className="text-pink-500 font-bold uppercase tracking-wider text-xs"> Matrix_Data_Stream</h2>
                       <div className="flex bg-slate-800 rounded p-1">
                         <button 
                          onClick={() => setMatrixType('adjacency')}
                          className={`px-3 py-1 rounded text-xs font-bold uppercase ${matrixType === 'adjacency' ? 'bg-cyan-600 text-white' : 'text-slate-500 hover:text-cyan-400'}`}
                         >
                           Adjacency
                         </button>
                         <button 
                          onClick={() => setMatrixType('laplacian')}
                          className={`px-3 py-1 rounded text-xs font-bold uppercase ${matrixType === 'laplacian' ? 'bg-purple-600 text-white' : 'text-slate-500 hover:text-purple-400'}`}
                         >
                           Laplacian
                         </button>
                       </div>
                     </div>
                     
                     <div className="overflow-x-auto">
                        <div className="inline-block border border-slate-700 bg-black/40 p-2 rounded relative">
                          <div className="grid gap-1" style={{ gridTemplateColumns: `repeat(${nodes.length}, minmax(32px, 1fr))` }}>
                            {matrix.map((row, i) => (
                              row.map((val, j) => (
                                <div 
                                  key={`${i}-${j}`} 
                                  className={`
                                    h-8 flex items-center justify-center rounded text-xs
                                    ${val !== 0 
                                        ? 'bg-cyan-900/30 text-cyan-400 border border-cyan-800' 
                                        : 'text-slate-700 bg-slate-900/50'}
                                    ${i === j && matrixType === 'laplacian' ? 'text-yellow-400 border-yellow-900/50' : ''}
                                  `}
                                >
                                  {val}
                                </div>
                              ))
                            ))}
                          </div>
                        </div>
                     </div>
                  </div> 
                  
                </div> 


                {/* RIGHT COLUMN: MATH ANALYSIS */}
                <div className="flex flex-col gap-4">
                  
                  {/* Eigenvalues Chart */}
                  <div className="bg-slate-900 rounded-xl border border-slate-700 p-6 shadow-lg">
                    <div className="flex items-center gap-2 mb-6 border-b border-slate-800 pb-2">
                      <Activity className="w-5 h-5 text-pink-500" />
                      <h2 className="font-bold text-lg text-slate-100 uppercase tracking-widest">Spectral Spectrum</h2>
                    </div>
                    
                    <div className="flex items-end h-48 gap-3 border-b border-slate-700 pb-2 mb-4 px-4 bg-slate-900/50 rounded-t-lg">
                      {eigenvalues.map((val, i) => (
                        <div key={i} className="flex-1 flex flex-col items-center group relative h-full justify-end">
                          <div 
                            className={`w-full rounded-t transition-all duration-500 hover:shadow-[0_0_15px_currentColor] relative
                              ${val < 0 ? 'bg-red-500' : 'bg-gradient-to-t from-cyan-900 to-cyan-400'}
                            `}
                            style={{ 
                              height: `${Math.min(100, Math.abs(val) * 15)}%`, 
                              opacity: 0.8
                            }}
                          >
                            <div className="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                          </div>
                          
                          <span className="text-[10px] font-mono mt-2 text-slate-500">λ{i+1}</span>
                          
                          <div className="absolute -top-8 bg-slate-800 text-cyan-300 text-xs px-2 py-1 rounded border border-cyan-900 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-10">
                            {val.toFixed(3)}
                          </div>
                        </div>
                      ))}
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4 mt-6">
                      {/* Card 1 */}
                      <div className="bg-slate-800/50 p-4 rounded border border-slate-700 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-1">
                           <div className="w-2 h-2 rounded-full bg-pink-500 animate-pulse"></div>
                        </div>
                        <div className="text-[10px] uppercase text-pink-400 font-bold tracking-widest mb-1">Max Eigenvalue (λ₁)</div>
                        <div className="text-3xl font-mono text-white drop-shadow-[0_0_5px_rgba(255,255,255,0.5)]">{eigenvalues[0]?.toFixed(4) || 0}</div>
                        <p className="text-xs text-slate-400 mt-2 leading-relaxed">
                          {matrixType === 'adjacency' 
                            ? "SYSTEM CAPACITY. Indicates network density and propagation potential." 
                            : "MAX CUT BOUND. Relates to graph diameter."}
                        </p>
                      </div>

                      {/* Card 2 */}
                      <div className={`p-4 rounded border relative overflow-hidden ${
                          matrixType === 'laplacian' && Number(getAlgebraicConnectivity()) < 0.001 
                          ? 'bg-red-900/20 border-red-800' 
                          : 'bg-slate-800/50 border-slate-700'
                        }`}>
                           <div className="text-[10px] uppercase text-yellow-400 font-bold tracking-widest mb-1">
                             {matrixType === 'laplacian' ? 'Algebraic Connectivity (λₙ₋₁)' : 'Spectral Radius'}
                           </div>
                           <div className="text-3xl font-mono text-white">
                             {matrixType === 'laplacian' 
                               ? getAlgebraicConnectivity() 
                               : Math.max(...eigenvalues.map(Math.abs)).toFixed(4)}
                           </div>
                           <p className="text-xs text-slate-400 mt-2 leading-relaxed">
                             {matrixType === 'laplacian' 
                                ? "NETWORK ROBUSTNESS. If 0.000, system is partitioned." 
                                : "DYNAMIC BOUND. Controls viral thresholds."}
                           </p>
                      </div>
                    </div>
                  </div>

                  {/* Explanation Card */}
                  <div className="bg-slate-800 text-slate-300 rounded-xl border border-slate-700 p-6 shadow-lg">
                    <h3 className="text-white font-bold text-sm uppercase tracking-widest mb-4 flex items-center gap-2 border-b border-slate-700 pb-2">
                      <Info className="w-4 h-4 text-cyan-400" />
                      Decryption Key
                    </h3>
                    
                    <div className="space-y-4 text-xs font-mono leading-relaxed">
                      <div>
                        <strong className="text-pink-400 block mb-1">{'>'} EIGENVECTOR_CENTRALITY</strong>
                        <p>
                           Node radius correlates to the Principal Eigenvector. Large nodes are "influencers" connected to other influencers.
                        </p>
                      </div>
                      
                      <div>
                         <strong className="text-yellow-400 block mb-1">{'>'} FIEDLER_VALUE (λ2)</strong>
                         <p>
                           In Laplacian mode, the second smallest value measures cohesiveness. 
                           <span className="text-white block mt-1 bg-slate-900 p-1 border-l-2 border-red-500">
                             TRY THIS: Use the [SPLIT] preset. Watch λ2 drop to zero.
                           </span>
                         </p>
                      </div>
                    </div>
                  </div>

                </div> 

              </main>
            </div>
          );
        };

        // Render the app directly into the root div
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
